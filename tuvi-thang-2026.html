  if(ln===cung) rels.push({cls:'rt-g',txt:'Trực Kích ⚡'});
  if(isXung(ln,cung)) rels.push({cls:'rt-r',txt:'Xung ☇'});
  if(isTamHop(ln,cung)) rels.push({cls:'rt-g',txt:'Tam Hợp ✦'});
  if(isHop(ln,cung)) rels.push({cls:'rt-b',txt:'Lục Hợp ☯'});
  if(!rels.length) rels.push({cls:'rt-m',txt:'Trung Lập'});
  return rels;
}

// Tự động chấm điểm cung theo lưu nguyệt
function scoreRel(ln, c){
  var score=0;
  var isHung=c.hung;
  var isTot=c.tot;
  if(ln===c.chi){ score += isHung ? -3 : 3; }
  if(isXung(ln,c.chi)){ score -= isHung ? 2 : 3; }
  if(isTamHop(ln,c.chi)){ score += isHung ? -1 : 2; }
  if(isHop(ln,c.chi)){ score += 1; }
  if(isTot) score+=1;
  if(score>=4) return 'tot';
  if(score>=2) return 'kha';
  if(score>=-1) return 'mid';
  if(score>=-3) return 'warn';
  return 'xau';
}

// Sinh nhận xét chi tiết theo tháng và cung
function genNX(ln, c, month){
  var m=month+1; // tháng 1-based
  var parts=[];
  var isHung=c.hung;
  var isTot=c.tot;

  if(ln===c.chi){
    if(isHung) parts.push('Lưu nguyệt T'+m+' ('+ln+') đóng trực tiếp vào '+c.ten+' — hung tinh bị kích, cần đặc biệt thận trọng suốt tháng này.');
    else parts.push('Lưu nguyệt T'+m+' ('+ln+') đóng trực tiếp vào '+c.ten+' — cung được kích hoạt mạnh, sao chủ phát huy sức mạnh tối đa.');
  }
  if(isXung(ln,c.chi)){
    parts.push('Lưu nguyệt '+ln+' xung vào cung '+c.ten+' ('+c.chi+') — toàn tháng cung này bị tác động tiêu cực, đặc biệt những ngày có chi ngày cũng xung.');
  }
  if(isTamHop(ln,c.chi)){
    parts.push('Lưu nguyệt '+ln+' tam hợp với cung '+c.ten+' ('+c.chi+') — được hỗ trợ tốt trong tháng, sao chủ phối hợp tốt.');
  }
  if(isHop(ln,c.chi)){
    parts.push('Lưu nguyệt '+ln+' lục hợp với chi '+c.chi+' ('+c.ten+') — quan hệ hài hòa, hỗ trợ nhẹ trong tháng.');
  }
  if(!parts.length){
    parts.push('Lưu nguyệt T'+m+' không có quan hệ trực tiếp với '+c.ten+' — cung hoạt động bình thường theo sao bản mệnh.');
  }
  return parts.join(' ');
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderMonth(m){
  var idx=m-1;
  var ln=LUU_NGUYET[idx];
  var dl=DL[idx];
  var ov=MOVERVIEW[idx];
  var score=MSCORE[idx];
  var grade=MGRADE[idx];

  var scoreColor=score>=8?'#2ecc71':score>=7?'#5dade2':score>=6?'#f0b429':score>=5?'#e67e22':'#e74c3c';

  var html='';
  // Header
  html+='<div class="mhdr">';
  html+='<div class="mhdr-top"><div class="mhdr-left">';
  html+='<h2>Tháng '+m+' Âm Lịch 2026 — Lưu Nguyệt: '+ln+'</h2>';
  html+='<div class="dates">📅 Dương lịch: '+dl+'</div>';
  html+='</div>';
  html+='<div class="mhdr-score"><div class="ms-num" style="color:'+scoreColor+'">'+score+'</div><div class="ms-lbl">/ 10 · '+grade+'</div></div>';
  html+='</div>';

  // Tags
  html+='<div class="mhdr-tags">';
  html+='<span class="mt mt-y">Lưu Nguyệt: '+ln+'</span>';
  CUNGS.forEach(function(c){
    if(c.chi===ln) html+='<span class="mt mt-b">Đóng tại: '+c.ten+' ('+c.chi+')</span>';
  });
  // Xung của lưu nguyệt
  CUNGS.forEach(function(c){
    if(isXung(ln,c.chi)) html+='<span class="mt mt-r">Xung: '+c.ten+' ('+c.chi+')</span>';
  });
  html+='</div>';
  html+='</div>'; // end mhdr

  // Overview
  html+='<div class="ovbox '+ov.cls+'">';
  html+='<div class="ov-title">'+ov.title+'</div>';
  html+='<div class="ov-body">'+ov.body+'</div>';
  html+='</div>';

  // Cung table
  html+='<table class="ct"><tr>';
  html+='<th width="15%">Cung</th>';
  html+='<th width="18%">Quan Hệ<br>Lưu Nguyệt</th>';
  html+='<th width="9%">Điểm</th>';
  html+='<th width="58%">Phân Tích & Khuyến Cáo Tháng '+m+'</th>';
  html+='</tr>';

  CUNGS.forEach(function(c){
    var rels=calcRel(ln,c.chi);
    var sc=scoreRel(ln,c);
    var trCls=sc==='tot'?'tr-tot':sc==='xau'||sc==='warn'?'tr-xau':sc==='mid'?'tr-mid':'';
    var crCls='cr-'+sc;
    var crTxt=sc==='tot'?'Rất Tốt':sc==='kha'?'Tốt':sc==='mid'?'Bình':sc==='warn'?'Cẩn Thận':'Xấu';
    var nx=genNX(ln,c,idx);

    html+='<tr class="'+trCls+'"><td>';
    html+=c.icon+' <span class="cname">'+c.ten+'</span><span class="cchi">'+c.chi+'</span>';
    html+='<div class="csao">'+c.sao+'</div>';
    html+='</td><td>';
    html+='<div class="rel-tags">';
    rels.forEach(function(r){ html+='<span class="rt '+r.cls+'">'+r.txt+'</span>'; });
    html+='</div>';
    html+='</td><td><span class="crating '+crCls+'">'+crTxt+'</span></td>';
    html+='<td><div class="cnx">'+nx+'</div>';
    html+='<div class="nens">✅ Nên: '+NEN[c.key]+'</div>';
    html+='<div class="khong">⛔ Không: '+KHONG[c.key]+'</div>';
    html+='</td></tr>';
  });

  html+='</table>';

  // Navigation
  html+='<div style="display:flex;justify-content:space-between;margin-top:12px;font-size:12px">';
  if(m>1) html+='<button onclick="clickTab('+(m-1)+')" style="background:var(--gold-lt);color:var(--amber);border:1px solid #d4aa50;border-radius:20px;padding:5px 14px;cursor:pointer;font-family:inherit;font-weight:600">← Tháng '+(m-1)+'</button>';
  else html+='<span></span>';
  if(m<12) html+='<button onclick="clickTab('+(m+1)+')" style="background:var(--gold-lt);color:var(--amber);border:1px solid #d4aa50;border-radius:20px;padding:5px 14px;cursor:pointer;font-family:inherit;font-weight:600">Tháng '+(m+1)+' →</button>';
  else html+='<a href="index.html" style="background:var(--gold-lt);color:var(--amber);border:1px solid #d4aa50;border-radius:20px;padding:5px 14px;text-decoration:none;font-weight:600">← Trang Chủ</a>';
  html+='</div>';

  return html;
}

function showMonth(m, btn){
  document.getElementById('m-root').innerHTML=renderMonth(m);
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(btn) btn.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function clickTab(m){
  var tabs=document.querySelectorAll('.tab');
  showMonth(m, tabs[m-1]);
}

// Init
showMonth(1, document.querySelector('.tab'));
