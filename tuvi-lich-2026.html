<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lịch Tử Vi 2026 — Mr. Hoàng</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,600;1,400&display=swap');
:root{
  --bg:#0f0c07;--bg2:#1a1208;--bg3:#231809;--bg4:#2e200c;
  --gold:#c8960a;--gold-lt:#f5e9c4;--gold-dim:rgba(200,150,10,.15);
  --amber:#7d5a0a;--text:#f0e6cc;--text2:#c8b882;--text3:#7d6a4a;
  --border:rgba(200,150,10,.25);--border2:rgba(200,150,10,.12);
  --cg:#1a7a3c;--cg2:rgba(26,122,60,.18);
  --cb:#1a5276;--cb2:rgba(26,82,118,.18);
  --cm:#3a3530;--cm2:rgba(58,53,48,.4);
  --cw:#7d4400;--cw2:rgba(125,68,0,.2);
  --cr:#8b1a12;--cr2:rgba(139,26,18,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.6;min-height:100vh}
a{color:var(--gold);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* ── TOPBAR ── */
.tb{position:sticky;top:0;z-index:200;background:rgba(15,12,7,.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border2);padding:8px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.tb-brand{font-family:'Noto Serif',serif;font-size:15px;color:var(--gold);white-space:nowrap}
.tb-sub{font-size:10px;color:var(--text3);margin-top:1px}
.tb-nav{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* ── BREADCRUMB ── */
.bc{display:flex;align-items:center;gap:4px;font-size:11.5px;padding:8px 16px;
  background:var(--bg2);border-bottom:1px solid var(--border2);flex-wrap:wrap}
.bc-item{color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .12s}
.bc-item:hover{background:var(--gold-dim);color:var(--text)}
.bc-item.active{color:var(--gold);font-weight:600}
.bc-sep{color:var(--text3);opacity:.4;font-size:10px}

/* ── VIEW TABS ── */
.view-tabs{display:flex;gap:0;background:var(--bg3);border-bottom:1px solid var(--border2);overflow-x:auto}
.view-tabs::-webkit-scrollbar{display:none}
.vtab{padding:10px 18px;font-size:12px;font-weight:600;color:var(--text3);
  background:transparent;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.vtab.active{color:var(--gold);border-bottom-color:var(--gold)}
.vtab:hover:not(.active){color:var(--text2);background:var(--gold-dim)}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 120px)}
@media(max-width:720px){.layout{grid-template-columns:1fr}.sidebar{display:none}}
.sidebar{background:var(--bg2);border-right:1px solid var(--border2);
  position:sticky;top:110px;height:calc(100vh - 110px);overflow-y:auto;padding:12px 0}
.sb-title{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--text3);
  text-transform:uppercase;padding:0 14px 8px}
.mi{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;
  border-left:3px solid transparent;transition:all .12s}
.mi:hover{background:var(--gold-dim)}
.mi.on{background:var(--gold-dim);border-left-color:var(--gold)}
.mi-n{font-family:'Noto Serif',serif;font-size:18px;color:var(--text3);min-width:26px;text-align:center}
.mi.on .mi-n{color:var(--gold)}
.mi-info{flex:1}
.mi-name{font-size:11.5px;font-weight:600;color:var(--text)}
.mi-chi{font-size:10px;color:var(--text3)}
.mi-sc{font-size:11px;font-weight:700;padding:1px 6px;border-radius:8px}
.sgreen{background:var(--cg);color:#fff}.sblue{background:var(--cb);color:#fff}
.sgray{background:var(--cm);color:#ccc}.swarn{background:#c8960a;color:#fff}.sred{background:var(--cr);color:#fff}

.main{padding:18px 18px 60px;overflow-x:hidden}

/* ── COMMON ── */
.sec-hdr{font-family:'Noto Serif',serif;font-size:14px;font-weight:600;color:var(--gold);
  border-left:3px solid var(--gold);padding:6px 12px;background:var(--gold-dim);
  border-radius:0 5px 5px 0;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:9px;overflow:hidden}
.divider{height:1px;background:var(--border2);margin:18px 0}
.badge{padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700}
.bg-great{background:var(--cg);color:#fff}.bg-good{background:var(--cb);color:#fff}
.bg-mid{background:var(--cm);color:#ccc}.bg-warn{background:#c8960a;color:#fff}.bg-bad{background:var(--cr);color:#fff}
.row-grid{display:grid;gap:10px}

/* ── YEAR VIEW ── */
.year-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.ys-card{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;border-left:3px solid}
.ys-card.g{border-left-color:#2ecc71}.ys-card.r{border-left-color:#e74c3c}.ys-card.y{border-left-color:#f39c12}.ys-card.b{border-left-color:#5dade2}
.ys-lbl{font-size:10px;font-weight:700;letter-spacing:.3px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.ys-val{font-size:12.5px;color:var(--text);line-height:1.6}

.month-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:20px}
.mc{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  padding:10px 12px;cursor:pointer;transition:all .15s;border-left:3px solid var(--border2)}
.mc:hover{background:var(--bg4);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.mc.great{border-left-color:#2ecc71}.mc.good{border-left-color:#5dade2}
.mc.mid{border-left-color:#636363}.mc.warn{border-left-color:#f39c12}.mc.bad{border-left-color:#e74c3c}
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.mc-num{font-family:'Noto Serif',serif;font-size:22px;font-weight:600;color:var(--text3)}
.mc-chi{font-size:10px;color:var(--text3);font-weight:600}
.mc-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px}
.mc-date{font-size:10px;color:var(--text3);margin-bottom:5px}
.mc-bar{height:4px;border-radius:2px;background:var(--border2);overflow:hidden;margin-bottom:5px}
.mc-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.mc-tag{font-size:10px;color:var(--text3);line-height:1.4}

.year-heatmap{margin-bottom:20px}
.hm-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;margin-bottom:6px}
.hm-cell{height:6px;border-radius:1px;cursor:pointer;transition:opacity .12s}
.hm-cell:hover{opacity:.7}

/* ── MONTH VIEW ── */
.month-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  flex-wrap:wrap;margin-bottom:18px}
.mt-main h2{font-family:'Noto Serif',serif;font-size:19px;color:var(--gold);margin-bottom:4px}
.mt-meta{font-size:11.5px;color:var(--text3);margin-bottom:8px}
.mt-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--bg3);color:var(--text2)}
.chip-g{background:rgba(26,122,60,.2);border-color:rgba(26,122,60,.4);color:#5dbd77}
.chip-r{background:rgba(139,26,18,.2);border-color:rgba(139,26,18,.4);color:#ff8a7a}
.chip-y{background:var(--gold-dim);border-color:var(--border);color:var(--gold)}
.mt-score-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:10px 16px;text-align:center;min-width:80px;flex-shrink:0}
.ms-big{font-family:'Noto Serif',serif;font-size:28px;font-weight:700;line-height:1}
.ms-sub{font-size:10px;color:var(--text3);margin-top:3px}

.stats5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:18px}
@media(max-width:480px){.stats5{grid-template-columns:repeat(3,1fr)}}
.s5{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;
  padding:8px 6px;text-align:center}
.s5-n{font-size:20px;font-weight:700;line-height:1;margin-bottom:2px}
.s5-l{font-size:9.5px;color:var(--text3)}

/* 12 cung tháng */
.cung-month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;margin-bottom:20px}
.cm-card{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;
  border-left:3px solid;cursor:pointer;transition:all .12s}
.cm-card:hover{background:var(--bg4)}
.cm-hdr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cm-icon{font-size:16px}
.cm-name{font-size:12px;font-weight:700;color:var(--text)}
.cm-chi{font-size:10px;color:var(--gold);font-weight:700;margin-left:1px}
.cm-score{margin-left:auto;font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px}
.cm-bar-row{display:flex;gap:2px;height:5px;border-radius:3px;overflow:hidden;margin-bottom:6px}
.cm-bar-seg{height:100%;min-width:2px;transition:flex .3s}
.seg-great{background:#2ecc71}.seg-good{background:#5dade2}.seg-mid{background:#636363}
.seg-warn{background:#f39c12}.seg-bad{background:#e74c3c}
.cm-body{font-size:11px;color:var(--text3);line-height:1.55}
.cm-strong{font-size:11px;color:var(--text2);font-weight:600;margin-top:3px}

/* Tuần cards */
.week-cards{display:grid;gap:8px;margin-bottom:18px}
.wk{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  overflow:hidden;cursor:pointer;transition:all .12s}
.wk:hover{border-color:var(--gold)}
.wk.on{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.wk-hdr{display:flex;align-items:center;gap:10px;padding:9px 13px;
  background:var(--bg4);border-bottom:1px solid var(--border2)}
.wk-num{font-family:'Noto Serif',serif;font-size:16px;font-weight:600;
  color:var(--gold);min-width:22px}
.wk-info{flex:1}
.wk-title{font-size:12px;font-weight:600;color:var(--text)}
.wk-sub{font-size:10.5px;color:var(--text3)}
.wk-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px}
.wk-arrow{color:var(--text3);transition:transform .2s;font-size:13px}
.wk.on .wk-arrow{transform:rotate(90deg)}
.wk-body{padding:10px 13px;display:none}
.wk.on .wk-body{display:block}
.wk-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
@media(max-width:500px){.wk-days{grid-template-columns:repeat(4,1fr)}}
.wd{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;
  padding:5px 4px;text-align:center;cursor:pointer;transition:all .12s}
.wd:hover{border-color:var(--gold)}
.wd.sel{border-color:var(--gold);background:var(--gold-dim)}
.wd.r-great{background:var(--cg2);border-color:rgba(26,122,60,.3)}
.wd.r-good{background:var(--cb2);border-color:rgba(26,82,118,.3)}
.wd.r-warn{background:var(--cw2);border-color:rgba(125,68,0,.3)}
.wd.r-bad{background:var(--cr2);border-color:rgba(139,26,18,.3)}
.wd-d{font-size:14px;font-weight:700;color:var(--text);line-height:1}
.wd-dl{font-size:9px;color:var(--text3)}
.wd-cc{font-size:9px;color:var(--text3)}
.wd-dot{width:5px;height:5px;border-radius:50%;margin:2px auto 0}
.wd.empty{visibility:hidden}
.wk-sum{font-size:11.5px;color:var(--text2);line-height:1.6;padding:8px 0}

/* ── CALENDAR ── */
.cal-wrap{background:var(--bg2);border:1px solid var(--border2);border-radius:9px;
  overflow:hidden;margin-bottom:18px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);
  background:var(--bg3);border-bottom:1px solid var(--border2)}
.cal-dow div{text-align:center;padding:7px 2px;font-size:10px;font-weight:700;
  color:var(--text3);letter-spacing:.3px}
.cal-dow div:last-child{color:#d4875a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border2)}
.dc{background:var(--bg2);padding:5px 3px 4px;text-align:center;cursor:pointer;
  transition:all .1s;position:relative;min-height:58px;
  display:flex;flex-direction:column;align-items:center;gap:1px}
.dc:hover:not(.empty){background:var(--bg4);z-index:1}
.dc.sel{background:var(--gold-dim)!important;box-shadow:inset 0 0 0 2px var(--gold);z-index:2}
.dc.empty{background:var(--bg);cursor:default}
.dc.r-great{background:var(--cg2)}.dc.r-good{background:var(--cb2)}
.dc.r-warn{background:var(--cw2)}.dc.r-bad{background:var(--cr2)}
.dc-d{font-size:14px;font-weight:700;color:var(--text);line-height:1}
.dc-dl{font-size:8.5px;color:var(--text3)}
.dc-cc{font-size:8.5px;color:var(--text3)}
.dc-dot{width:5px;height:5px;border-radius:50%;margin-top:1px;flex-shrink:0}
.dot-great{background:#2ecc71}.dot-good{background:#5dade2}
.dot-mid{background:#636363}.dot-warn{background:#f39c12}.dot-bad{background:#e74c3c}
.dc.wknd .dc-d{color:#d4875a}
.no-show{opacity:.2;pointer-events:none}

/* ── DAY DETAIL ── */
.day-panel{background:var(--bg2);border:1px solid var(--border);border-radius:9px;
  overflow:hidden;margin-bottom:18px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.dp-hdr{padding:14px 18px;background:linear-gradient(90deg,var(--bg3),var(--bg2));
  border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.dp-date{font-family:'Noto Serif',serif;font-size:24px;font-weight:600;color:var(--gold);line-height:1}
.dp-info{flex:1}
.dp-cc{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.dp-dl{font-size:11px;color:var(--text3)}
.dp-body{padding:14px 16px}
.cung-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px;margin-bottom:12px}
.cc-card{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;
  padding:9px 11px;border-left:3px solid var(--border2)}
.cc-card.great{border-left-color:#2ecc71;background:rgba(26,122,60,.1)}
.cc-card.good{border-left-color:#5dade2;background:rgba(26,82,118,.1)}
.cc-card.warn{border-left-color:#f39c12;background:rgba(125,68,0,.1)}
.cc-card.bad{border-left-color:#e74c3c;background:rgba(139,26,18,.1)}
.cc-hdr{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.cc-ico{font-size:13px}
.cc-nm{font-size:11.5px;font-weight:700;color:var(--text)}
.cc-ch{font-size:10px;color:var(--gold);font-weight:700;margin-left:2px}
.cc-sc{margin-left:auto;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700}
.cc-sao{font-size:9.5px;color:var(--text3);font-style:italic;margin-bottom:4px;line-height:1.4}
.cc-rels{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px}
.rel{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;background:rgba(255,255,255,.05)}
.cc-nx{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:4px}
.cc-nen{font-size:10.5px;color:#5dbd77}
.cc-khong{font-size:10.5px;color:#ff8a7a;margin-top:2px}
.day-ov{padding:10px 14px;border-radius:7px;border-left:3px solid;font-size:12px;line-height:1.7;margin-top:10px}
.ov-title{font-weight:700;margin-bottom:3px;color:var(--text)}

/* ── FILTER BAR ── */
.fbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.fbar-lbl{font-size:10.5px;color:var(--text3);font-weight:600;margin-right:2px}
.fb{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
  border:1px solid var(--border2);background:transparent;color:var(--text3);transition:all .12s}
.fb.on{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}
.fb:hover{background:var(--gold-dim);color:var(--text2)}

/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--text3);margin-bottom:12px}
.leg{display:flex;align-items:center;gap:4px}
.leg-d{width:8px;height:8px;border-radius:2px}

/* ── TODAY STRIP (#4) ── */
.today-strip{background:linear-gradient(135deg,var(--bg3) 0%,rgba(200,150,10,.08) 100%);
  border-bottom:2px solid var(--gold);padding:10px 18px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;cursor:pointer;transition:opacity .15s}
.today-strip:hover{opacity:.92}
.ts-label{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--gold);background:var(--gold-dim);padding:2px 7px;border-radius:8px;white-space:nowrap}
.ts-dates{display:flex;flex-direction:column;gap:1px}
.ts-dl{font-family:'Noto Serif',serif;font-size:17px;font-weight:700;color:var(--text);line-height:1}
.ts-al{font-size:10.5px;color:var(--gold);font-weight:600}
.ts-cc{font-size:11px;color:var(--text2)}
.ts-divider{width:1px;height:36px;background:var(--border);flex-shrink:0}
.ts-truc{display:flex;flex-direction:column;gap:2px}
.ts-badge{padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;white-space:nowrap}
.ts-hoang{background:rgba(46,204,113,.2);border:1px solid rgba(46,204,113,.4);color:#5dbd77}
.ts-hac{background:rgba(139,26,18,.2);border:1px solid rgba(139,26,18,.4);color:#ff8a7a}
.ts-truc-name{background:var(--bg2);border:1px solid var(--border2);color:var(--text2)}
.ts-cungs{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.ts-cung-chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px}
.ts-main-rating{margin-left:auto;text-align:center;flex-shrink:0}
.ts-rating-big{font-family:'Noto Serif',serif;font-size:14px;font-weight:700;padding:5px 12px;border-radius:8px}
.ts-nendo{font-size:10.5px;color:var(--text2);line-height:1.5;flex:1;min-width:150px}
.ts-btn{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;
  background:var(--gold);color:#000;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* ── SAO NGÀY — 12 Trực / 12 Thần (#7) ── */
.saongay-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  padding:8px 12px;margin-bottom:12px}
.sn-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.sn-lbl{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.sn-val{font-size:11.5px;font-weight:700;padding:2px 8px;border-radius:8px}
.sn-hoang{background:rgba(46,204,113,.18);color:#5dbd77;border:1px solid rgba(46,204,113,.3)}
.sn-hac{background:rgba(139,26,18,.18);color:#ff8a7a;border:1px solid rgba(139,26,18,.3)}
.sn-truc{background:var(--gold-dim);color:var(--gold);border:1px solid var(--border)}
.sn-truc-bad{background:rgba(139,26,18,.12);color:#ff8a7a;border:1px solid rgba(139,26,18,.25)}
.sn-truc-ok{background:rgba(58,53,48,.4);color:var(--text2);border:1px solid var(--border2)}
.sn-divider{width:1px;height:30px;background:var(--border2)}

/* ── ACTIVITY FILTER (#3) — CSS ── */
.act-filter{display:flex;flex-wrap:wrap;gap:5px;padding:10px 14px;
  background:var(--bg3);border-bottom:1px solid var(--border2);align-items:center}
.act-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;

var BASE_DATE=new Date(2026,0,29);
function getCC(d){
  var n=Math.round((d-BASE_DATE)/86400000);
  return{can:CAN[(4+n%10+600)%10],chi:CHI[(8+n%12+600)%12]};
}

function rateC(c,nc,ln){
  var s=0,h=c.hung,t=c.tot,cn=c.chi;
  if(cn===nc) s+=h?-3:3; if(isXung(cn,nc)) s-=h?2:3; if(isTH(cn,nc)) s+=h?-1:2; if(LUC_HOP[cn]===nc) s+=1;
  if(cn===ln) s+=h?-3:2; if(isXung(cn,ln)) s-=h?2:2; if(isTH(cn,ln)) s+=h?-1:2;
  if(t) s+=1;
  return s>=5?'great':s>=3?'good':s>=-1?'mid':s>=-3?'warn':'bad';
}
function rateDay(nc,ln){
  var t=0;
  CUNGS.forEach(function(c){var r=rateC(c,nc,ln);t+=r==='great'?2:r==='good'?1:r==='mid'?0:r==='warn'?-1:-2;});
  return t>=8?'great':t>=4?'good':t>=-4?'mid':t>=-8?'warn':'bad';
}
function rateLabel(r){return r==='great'?'⭐ Rất Tốt':r==='good'?'✅ Tốt':r==='mid'?'〰 Trung Bình':r==='warn'?'⚠ Cẩn Thận':'🔴 Xấu';}
function rateBadge(r){return'bg-'+r;}
function rateColor(r){return r==='great'?'#2ecc71':r==='good'?'#5dade2':r==='mid'?'#636363':r==='warn'?'#f39c12':'#e74c3c';}
function rateDayScore(nc,ln){
  var t=0;
  CUNGS.forEach(function(c){var r=rateC(c,nc,ln);t+=r==='great'?2:r==='good'?1:r==='mid'?0:r==='warn'?-1:-2;});
  return t; // raw numeric score (range ~-24 to +24)
}

function activityMatchDay(day, actId){
  if(actId==='all') return true;
  var act=ACT_TYPES.find(function(a){return a.id===actId;});
  if(!act||!act.cungs.length) return true;
  var ln=LN[day.m-1];
  var ok=true;
  act.cungs.forEach(function(cn){
    var cung=CUNGS.find(function(c){return c.ten===cn;});
    if(cung){var r=rateC(cung,day.cc.chi,ln);if(r==='bad'||r==='warn')ok=false;}
  });
  // At least one key cung must be good/great
  var hasGood=false;
  act.cungs.forEach(function(cn){
    var cung=CUNGS.find(function(c){return c.ten===cn;});
    if(cung){var r=rateC(cung,day.cc.chi,ln);if(r==='great'||r==='good')hasGood=true;}
  });
  return ok&&hasGood;
}

var ALL=[];
for(var mi=0;mi<12;mi++){
  for(var di=0;di<M_DAYS[mi];di++){
    var dl=new Date(M_START[mi].getTime()+di*86400000);
    var cc=getCC(dl);
    ALL.push({m:mi+1,d:di+1,dl:dl,cc:cc,r:rateDay(cc.chi,LN[mi])});
  }
}

function getDays(m){return ALL.filter(function(d){return d.m===m;});}
function getDay(m,d){return ALL.find(function(x){return x.m===m&&x.d===d;});}

function getSolarDays(solM){return ALL.filter(function(d){return d.dl.getMonth()===solM;});}
function lookupBySolar(solM,solD){return ALL.find(function(d){return d.dl.getMonth()===solM&&d.dl.getDate()===solD;});}
function getSolarScore(solM){
  var days=getSolarDays(solM);if(!days.length)return 5;
  var t=0;days.forEach(function(d){t+=d.r==='great'?4:d.r==='good'?3:d.r==='mid'?2:d.r==='warn'?1:0;});
  return Math.min(10,Math.round(t/days.length*2.5));
}

// Month palace stats
function palaceMonthStat(mi){
  var ln=LN[mi],stat={};
  CUNGS.forEach(function(c){stat[c.chi]={great:0,good:0,mid:0,warn:0,bad:0,score:0};});
  for(var di=0;di<M_DAYS[mi];di++){
    var dl=new Date(M_START[mi].getTime()+di*86400000);
    var nc=getCC(dl).chi;
    CUNGS.forEach(function(c){
      var r=rateC(c,nc,ln);
      stat[c.chi][r]++;
      stat[c.chi].score+=r==='great'?4:r==='good'?3:r==='mid'?2:r==='warn'?1:0;
    });
  }
  return stat;
}

// Weeks within a month (7-day blocks)
function getWeeks(m){
  var days=getDays(m),nw=Math.ceil(days.length/7),weeks=[];
  for(var w=0;w<nw;w++) weeks.push(days.slice(w*7,w*7+7));
  return weeks;
}
function weekOverallRating(wdays){
  var cnt={great:0,good:0,mid:0,warn:0,bad:0};
  wdays.forEach(function(d){cnt[d.r]++;});
  if(cnt.great+cnt.good>cnt.mid+cnt.warn+cnt.bad) return cnt.great>cnt.good?'great':'good';
  if(cnt.bad+cnt.warn>cnt.great+cnt.good) return cnt.bad>cnt.warn?'bad':'warn';
  return 'mid';
}

  h+='<span class="ts-badge '+(isHD?'ts-hoang':'ts-hac')+'" style="margin-top:2px">'+(isHD?'☀ Hoàng Đạo':'🌑 Hắc Đạo')+'·'+than+'</span>';

  h+='<div class="ts-divider"></div>';
  h+='<div class="ts-cungs">';
  best.slice(0,3).forEach(function(c){h+='<span class="ts-cung-chip" style="background:'+rateColor(c.r)+'20;border:1px solid '+rateColor(c.r)+'50;color:'+rateColor(c.r)+'">'+c.i+' '+c.t+'</span>';});
  if(warn.length) warn.slice(0,2).forEach(function(c){h+='<span class="ts-cung-chip" style="background:#e74c3c18;border:1px solid #e74c3c40;color:#ff8a7a">⚠ '+c.t+'</span>';});
  h+='</div>';
  h+='<div class="ts-nendo">✅ '+getNen(best.length?best[0].t:'Mệnh')+'</div>';
  h+='<div class="ts-main-rating"><span class="ts-rating-big badge '+rateBadge(rc)+'" style="display:block">'+rateLabel(rc)+'</span></div>';
  h+='<button class="ts-btn" onclick="event.stopPropagation();goTodayDay()">Chi tiết →</button>';
  strip.innerHTML=h;
}

function goYear(){solarMode=false;view='year';selectedDay=null;render();}
function goMonth(m){solarMode=false;currentMonth=m;currentWeek=0;selectedDay=null;view='month';render();}
function goWeek(w){currentWeek=w;view='week';render();}
function goDay(day){if(!day)return;selectedDay=day;currentMonth=day.m;view='day';render();}
function goSolarMonth(solM){solarMode=true;currentSolarMonth=solM;selectedDay=null;view='solar';render();}
function goCEO(){solarMode=false;view='ceo';render();}
function goNatal(){solarMode=false;view='natal';render();}
function toggleSolar(){
  if(solarMode){solarMode=false;view='year';render();}
  else{solarMode=true;currentSolarMonth=new Date().getMonth();view='solar';render();}
}

function updateBreadcrumb(){
  var bc=document.getElementById('bc');
  var h='<span class="bc-item'+(view==='year'?' active':'')+'" onclick="goYear()">🏠 Cả Năm 2026</span>';
  if(view==='ceo'){
    h+='<span class="bc-sep">›</span>';
    h+='<span class="bc-item active">💼 Phân Tích CEO</span>';
  } else if(view==='natal'){
    h+='<span class="bc-sep">›</span>';
    h+='<span class="bc-item active">🔮 Lá Số Tử Vi</span>';
  } else if(view==='solar'){
    h+='<span class="bc-sep">›</span>';
    h+='<span class="bc-item active">☀ Lịch Dương — '+SOL_M_NAME[currentSolarMonth]+'/2026</span>';
  } else if(view!=='year'){
    h+='<span class="bc-sep">›</span>';
    h+='<span class="bc-item'+(view==='month'&&!selectedDay?' active':'')+'" onclick="goMonth('+currentMonth+')">Tháng '+currentMonth+' Âm</span>';
  }
  if(view==='week'||view==='day'){
    h+='<span class="bc-sep">›</span>';
    h+='<span class="bc-item'+(view==='week'?' active':'')+'" onclick="goWeek('+currentWeek+')">Tuần '+(currentWeek+1)+'</span>';
  }
  if(view==='day'&&selectedDay){
    h+='<span class="bc-sep">›</span>';
    var dl=selectedDay.dl;
    h+='<span class="bc-item active">'+dl.getDate()+'/'+(dl.getMonth()+1)+'/2026 = Ngày '+selectedDay.d+'/'+selectedDay.m+' Âm</span>';
  }
  bc.innerHTML=h;
}

function updateTabs(){
  var tabs=['year','solar','month','week','day','ceo','natal'];
  tabs.forEach(function(t){
    var el=document.getElementById('vt-'+t);
    if(!el)return;
    if(t==='year'){el.style.display='';el.classList.toggle('active',view==='year');}
    else if(t==='ceo'){el.style.display='';el.classList.toggle('active',view==='ceo');}
    else if(t==='natal'){el.style.display='';el.classList.toggle('active',view==='natal');}
    else if(t==='solar'){
      el.style.display=(solarMode||view==='solar')?'':'none';
      el.classList.toggle('active',view==='solar');
      document.getElementById('vt-s-lbl').textContent=SOL_M_NAME[currentSolarMonth];
    }
    else if(t==='month'){
      el.style.display=(!solarMode&&(view==='month'||view==='week'||view==='day'))?'':'none';
      el.classList.toggle('active',view==='month');
    }
    else if(t==='week'){el.style.display=(view==='week'||view==='day')?'':'none';el.classList.toggle('active',view==='week');}
    else if(t==='day'){el.style.display=(view==='day'&&selectedDay)?'':'none';el.classList.toggle('active',view==='day');}
  });
  document.getElementById('vt-m-lbl').textContent='Tháng '+currentMonth+' Âm';
  document.getElementById('vt-w-lbl').textContent='T'+(currentWeek+1)+'/T'+currentMonth;
  if(selectedDay){var dl=selectedDay.dl;document.getElementById('vt-d-lbl').textContent=dl.getDate()+'/'+(dl.getMonth()+1);}
  // Toggle solar button appearance
  var btn=document.getElementById('solar-btn');
  if(btn){btn.style.background=solarMode?'var(--gold)':'var(--bg3)';btn.style.color=solarMode?'#000':'var(--text2)';btn.style.borderColor=solarMode?'var(--gold)':'var(--border)';}
}

// VIEW: SOLAR CALENDAR (Lịch Dương — Google Calendar style)
// ══════════════════════════════════════════════════════════════
function renderSolarCal(){
  var solM=currentSolarMonth;
  var totalDays=new Date(2026,solM+1,0).getDate();
  var firstDay=new Date(2026,solM,1);
  var days=getSolarDays(solM);
  var cnt={great:0,good:0,mid:0,warn:0,bad:0};
  days.forEach(function(d){cnt[d.r]++;});
  var today=new Date(); var todayM=today.getMonth(),todayD=today.getDate();

  // Lunar months in this solar month
  var lunarSet={};
  days.forEach(function(d){lunarSet[d.m]=true;});
  var lunarNums=Object.keys(lunarSet).map(Number).sort(function(a,b){return a-b;});

  var h='';
  h+='<div style="margin:-18px -18px 0;padding-bottom:0" id="sol-cal-root">';
  h+='<div class="sol-outer">';

  // ── Month strip picker
  h+='<div class="sol-month-strip">';
  for(var i=0;i<12;i++){
    h+='<button class="sol-ms'+(i===solM?' on':'')+'" onclick="goSolarMonth('+i+')">T'+(i+1)+'</button>';
  }
  h+='</div>';

  // ── Navigation header
  h+='<div class="sol-nav">';
  h+='<div class="sol-nav-title">Tháng '+(solM+1)+' 2026</div>';
  h+='<div class="sol-nav-btns">';
  h+='<button class="sol-today-btn" onclick="goSolarMonth('+(new Date()).getMonth()+')">Hôm nay</button>';
  h+='<button class="sol-nav-btn" onclick="goSolarMonth(Math.max(0,'+(solM-1)+'))">‹</button>';
  h+='<button class="sol-nav-btn" onclick="goSolarMonth(Math.min(11,'+(solM+1)+'))">›</button>';
  h+='</div></div>';

  // ── Summary bar
  h+='<div class="sol-sumbar">';
  h+='<span style="font-size:11px;color:var(--text3);font-weight:600">1/'+(solM+1)+' – '+totalDays+'/'+(solM+1)+'/2026</span>';
  h+='<span style="font-size:10px;color:var(--text3)">☀↔🌙 Tháng Âm: ';
  h+=lunarNums.map(function(n){return '<strong style="color:var(--gold)">'+n+' ('+M_NAME[n-1]+')</strong>';}).join(', ');
  h+='</span>';
  var sumItems=[{r:'great',e:'⭐',c:'#2ecc71'},{r:'good',e:'✅',c:'#5dade2'},{r:'warn',e:'⚠',c:'#f39c12'},{r:'bad',e:'🔴',c:'#e74c3c'}];
  sumItems.forEach(function(x){if(cnt[x.r]){h+='<span class="sol-sum-chip"><span style="color:'+x.c+'">'+x.e+'</span>'+cnt[x.r]+'</span>';}});
  h+='</div>';

  // ── Activity filter strip
  h+='<div class="act-filter">';
  h+='<span class="act-lbl">Lọc việc:</span>';
  ACT_TYPES.forEach(function(a){
    var on=currentActivity===a.id;
    h+='<button class="act-btn'+(on?' on':'')+'" style="'+(on?'background:'+a.color+';':'')+';" onclick="setActivity(\''+a.id+'\')">'+a.label+'</button>';
  });
  h+='</div>';

  // ── Days of week header
  h+='<div class="sol-dow">';
  ['T2','T3','T4','T5','T6','T7','CN'].forEach(function(d,i){h+='<div class="'+(i===6?'sun':'')+'">'+(i===6?'<span style="color:#d4875a">':'')+d+(i===6?'</span>':'')+'</div>';});
  h+='</div>';

  // ── Calendar grid
  h+='<div class="sol-grid">';
  var pad=(firstDay.getDay()===0?6:firstDay.getDay()-1);
  // Previous month filler cells
  for(var p=0;p<pad;p++){
    var prevMonthDays=new Date(2026,solM,0).getDate();
    var prevD=prevMonthDays-pad+p+1;
    h+='<div class="sol-cell sol-empty"><div class="sol-day-num">'+prevD+'</div></div>';
  }

  for(var solD=1;solD<=totalDays;solD++){
    var day=lookupBySolar(solM,solD);
    var curDate=new Date(2026,solM,solD);
    var dow=curDate.getDay(); // 0=Sun
    var isSun=dow===0;
    var isToday=(solM===todayM&&solD===todayD&&2026===today.getFullYear());
    var isSel=day&&selectedDay&&selectedDay.m===day.m&&selectedDay.d===day.d;

    var actOk=day?activityMatchDay(day,currentActivity):false;
    var cellCls='sol-cell';
    if(day) cellCls+=' sol-'+day.r;
    if(isToday) cellCls+=' sol-today';
    if(isSel) cellCls+=' sol-sel';
    if(currentActivity!=='all'&&day&&actOk) cellCls+=' sol-act-match';
    if(currentActivity!=='all'&&day&&!actOk) cellCls+=' sol-act-dim';

    var onclick=day?'goDay(lookupBySolar('+solM+','+solD+'))':'';
    var title=day?(solD+'/'+(solM+1)+'/2026 = Ngày '+day.d+'/'+day.m+' Âm · '+day.cc.can+' '+day.cc.chi+' · '+rateLabel(day.r)):(solD+'/'+(solM+1)+'/2026 – chưa có dữ liệu');

    h+='<div class="'+cellCls+'"'+(onclick?' onclick="'+onclick+'"':'')+' title="'+title+'">';

    // Day number
    if(isToday){
      h+='<div class="sol-day-num'+(isSun?' sun':'')+'"><div style="background:var(--gold);color:#000;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin:0 auto">'+solD+'</div></div>';
    } else {
      h+='<div class="sol-day-num'+(isSun?' sun':'')+'" style="'+(isSun?'color:#d4875a':'')+'">'+solD+'</div>';
    }

    if(day){
      // Lunar date badge
      h+='<div class="sol-lunar">'+day.d+'/'+day.m+'🌙</div>';
      // Can-Chi
      h+='<div class="sol-cc">'+day.cc.can+' '+day.cc.chi+'</div>';
      // Rating indicator bar at bottom
      h+='<div class="sol-rating-bar" style="background:'+rateColor(day.r)+';opacity:.7"></div>';
    } else {
      h+='<div style="font-size:8.5px;color:var(--text3);margin-top:3px">Trước TG</div>';
    }
    h+='</div>';
  }

  // Next month filler
  var lastDow=new Date(2026,solM,totalDays).getDay();
  var trailing=(lastDow===0)?0:(7-lastDow);
  for(var nf=1;nf<=trailing;nf++){
    h+='<div class="sol-cell sol-empty"><div class="sol-day-num">'+nf+'</div></div>';
  }

  h+='</div>'; // sol-grid
  h+='</div>'; // sol-outer

  // ── Best days section below calendar
  var bestDays=days.filter(function(d){return d.r==='great'||d.r==='good';});
  if(bestDays.length){
    h+='<div class="divider" style="margin-top:20px"></div>';

    h+='<div style="flex:1">';
    h+='<div style="font-size:13px;font-weight:600;color:var(--text)">'+cc.can+' '+cc.chi+' · '+dlFull(day.dl)+'</div>';
    h+='<div style="font-size:11px;color:var(--text3)">Tháng '+day.m+' Âm · Lưu Nguyệt: '+ln+'</div>';
    h+='</div>';
    h+='<span class="badge '+rateBadge(rc)+'">'+rateLabel(rc)+'</span>';
    h+='<span style="color:var(--text3);font-size:12px">› Chi tiết</span>';

      h+='<span style="font-size:11px;font-weight:700;color:var(--text)">'+c.ten+'</span>';
      h+='<span style="font-size:9px;font-weight:700;padding:1px 4px;border-radius:4px;margin-left:auto;background:'+cc2+';color:'+(cr==='mid'?'#ccc':'#fff')+'">'+rateLabel(cr).split(' ')[0]+'</span>';

    });
    h+='</div></div></div>';
  });

  document.getElementById('main').innerHTML=h;
}

function genNX(c,nc,ln){
  var p=[],cn=c.chi,n=c.ten,h=c.hung;
  if(cn===ln) p.push(h?'LN đóng tại '+n+' — hung tinh phát tác suốt tháng.':'LN đóng tại '+n+' — cung được kích hoạt mạnh nhất tháng.');
  if(isXung(cn,ln)){p.push('LN xung '+n+' — áp lực cả tháng.');if(isXung(cn,nc))p.push('<strong style="color:#ff8a7a">Hôm nay xung kép — cực kỳ cẩn thận.</strong>');}
  if(isTH(cn,ln)) p.push('LN tam hợp '+n+' — được nâng đỡ suốt tháng.');
  if(cn===nc) p.push(h?'Ngày '+nc+' kích trực tiếp — hung tinh nổi lên.':'Ngày '+nc+' kích '+n+' — sao chủ phát huy mạnh.');
  else if(isXung(cn,nc)&&!isXung(cn,ln)) p.push('Ngày '+nc+' xung '+n+' — chú ý hôm nay.');
  else if(isTH(cn,nc)&&!isTH(cn,ln)) p.push('Ngày '+nc+' tam hợp '+n+' — hỗ trợ thêm hôm nay.');
  else if(LUC_HOP[cn]===nc) p.push('Lục hợp nhẹ — hài hòa, thuận lợi vừa phải.');
  if(!p.length) p.push('Không có tương tác đặc biệt hôm nay. '+(h?'Hung tinh tạm yên.':'Sao chủ bình thường.'));
  return p.join(' ');
}

// #2 — FORTUNE TIMELINE (SVG Wave Chart)
// ══════════════════════════════════════════════════════════════
function renderTimeline(containerId){
  var el=document.getElementById(containerId);
  if(!el) return;
  var W=el.offsetWidth||600, H=100, PAD=8;
  var scores=ALL.map(function(d){return rateDayScore(d.cc.chi,LN[d.m-1]);});
  // Smooth: 3-day moving average
  var smooth=scores.map(function(_,i){
    var s=0,c=0;
    for(var k=Math.max(0,i-1);k<=Math.min(scores.length-1,i+1);k++){s+=scores[k];c++;}
    return s/c;
  });
  var mn=Math.min.apply(null,smooth),mx=Math.max.apply(null,smooth);
  var range=mx-mn||1;
  var n=smooth.length;
  function xp(i){return PAD+(i/(n-1))*(W-2*PAD);}
  function yp(v){return H-PAD-((v-mn)/range)*(H-2*PAD);}
  // Zero line
  var zy=yp(0);
  var pts=smooth.map(function(v,i){return xp(i)+','+yp(v);}).join(' ');
  // Fill path
  var fillPath='M'+xp(0)+','+H+' L'+pts.split(' ').map(function(p,i){return(i===0?'L':'')+p;}).join(' L')+' L'+xp(n-1)+','+H+' Z';
  // Month separators
  var mLines='',mLabels='';
  var dayIdx=0;
  ALL.forEach(function(d,i){
    if(d.d===1){
      var x=xp(i);
      mLines+='<line x1="'+x+'" y1="0" x2="'+x+'" y2="'+H+'" stroke="rgba(200,150,10,.15)" stroke-width="1"/>';
      mLabels+='<text x="'+x+'" y="'+(H-1)+'" font-size="7" fill="rgba(200,150,10,.5)" text-anchor="middle">T'+d.m+'</text>';
    }
  });
  // Today marker
  var now=new Date();
  var todayIdx=ALL.findIndex(function(d){return d.dl.getDate()===now.getDate()&&d.dl.getMonth()===now.getMonth();});
  var todayLine=todayIdx>=0?'<line x1="'+xp(todayIdx)+'" y1="0" x2="'+xp(todayIdx)+'" y2="'+H+'" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="3,2"/>':'';
  var svg='<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" id="tl-svg" style="cursor:crosshair">';
  svg+='<defs><linearGradient id="tlg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2ecc71" stop-opacity=".3"/><stop offset="100%" stop-color="#e74c3c" stop-opacity=".05"/></linearGradient></defs>';
  svg+=mLines;
  svg+='<line x1="'+PAD+'" y1="'+zy+'" x2="'+(W-PAD)+'" y2="'+zy+'" stroke="rgba(255,255,255,.1)" stroke-width="1"/>';
  svg+='<path d="M'+pts.replace(/ /g,' L')+'" fill="none" stroke="url(#tlg2)" stroke-width="1.5"/>';
  svg+='<defs><linearGradient id="tlg2" x1="0" y1="0" x2="1" y2="0">';
  smooth.forEach(function(v,i){
    var pct=(i/(n-1)*100).toFixed(1);
    var c=v>=4?'#2ecc71':v>=1?'#5dade2':v>=-1?'#888':v>=-4?'#f39c12':'#e74c3c';
    svg+='<stop offset="'+pct+'%" stop-color="'+c+'"/>';
  });
  svg+='</linearGradient></defs>';
  svg+=todayLine+mLabels;
  // Redraw line on top with gradient
  svg+='<polyline points="'+pts+'" fill="none" stroke="url(#tlg2)" stroke-width="1.8"/>';
  svg+='<text x="'+xp(n-1)-2+'" y="'+(zy-3)+'" font-size="7" fill="rgba(255,255,255,.3)" text-anchor="end">0</text>';
  svg+='</svg>';
  // Tooltip overlay
  var tooltip='<div class="tl-tooltip" id="tl-tip"></div>';
  el.innerHTML=svg+tooltip;
  // Mouse events
  var svgEl=document.getElementById('tl-svg');
  if(svgEl){
    svgEl.addEventListener('mousemove',function(e){
      var rect=svgEl.getBoundingClientRect();
      var rx=(e.clientX-rect.left)/rect.width;
      var i=Math.round(rx*(n-1));
      i=Math.max(0,Math.min(n-1,i));
      var d=ALL[i];
      var tip=document.getElementById('tl-tip');
      if(tip&&d){
        tip.style.display='block';
        tip.style.left=(e.clientX-el.getBoundingClientRect().left)+'px';
        tip.style.top='4px';
        tip.innerHTML=d.dl.getDate()+'/'+(d.dl.getMonth()+1)+' · '+d.d+'/'+d.m+'🌙 · '+d.cc.can+' '+d.cc.chi+' · '+rateLabel(d.r);
      }
    });
    svgEl.addEventListener('mouseleave',function(){var t=document.getElementById('tl-tip');if(t)t.style.display='none';});
    svgEl.addEventListener('click',function(e){
      var rect=svgEl.getBoundingClientRect();
      var rx=(e.clientX-rect.left)/rect.width;
      var i=Math.round(rx*(n-1));
      i=Math.max(0,Math.min(n-1,i));
      goDay(ALL[i]);
    });
  }
}

  ];

      });
    });
    return cnt?((total/cnt)-1)/4:0.5; // 0-1

  var top10=sorted.slice(0,10), bot5=sorted.slice(-5).reverse();

function parseQuery(q){
  var now=new Date();
  var today=ALL.find(function(d){return d.dl.getDate()===now.getDate()&&d.dl.getMonth()===now.getMonth();});
  // Hôm nay
  if(q.includes('hôm nay')||q.includes('hom nay')){
    if(!today) return 'Hôm nay chưa có dữ liệu tử vi (ngoài phạm vi năm Bính Ngọ).';
    var mi=today.m-1,nc=today.cc.chi,ln=LN[mi];
    var truc=getTruc(CHI_IDX[nc],mi),than=getThan(CHI_IDX[nc],mi);
    var best=[],warn2=[];
    CUNGS.forEach(function(c){var r=rateC(c,nc,ln);if(r==='great'||r==='good')best.push(c.ten);if(r==='bad')warn2.push(c.ten);});
    return '<strong>'+today.dl.getDate()+'/'+(today.dl.getMonth()+1)+'/2026</strong> = Ngày <strong>'+today.d+'/'+today.m+' Âm</strong> · '+today.cc.can+' '+today.cc.chi+'<br>'
      +'📅 '+truc+' · '+(isHoangDao(than)?'☀ Hoàng Đạo':'🌑 Hắc Đạo')+'<br>'
      +'<span style="color:'+rateColor(today.r)+'">'+rateLabel(today.r)+'</span><br>'
      +(best.length?'Cung sáng: '+best.slice(0,3).join(', ')+'<br>':'')
      +(warn2.length?'⚠ Chú ý: '+warn2.join(', '):'');
  }
  // Tháng tốt nhất năm
  if(q.includes('tháng tốt nhất')||q.includes('tháng vàng')){
    var best2=M_SCORE.map(function(s,i){return{i:i,s:s};}).sort(function(a,b){return b.s-a.s;});
    return 'Top 3 tháng tốt nhất năm Bính Ngọ:<br>'
      +best2.slice(0,3).map(function(x){return '🌟 <strong>Tháng '+(x.i+1)+'</strong> ('+M_NAME[x.i]+') — '+x.s+'/10: '+M_GRADE[x.i];}).join('<br>');
  }
  // Ngày tốt nhất tháng này
  if(q.includes('ngày tốt nhất tháng này')||q.includes('tốt nhất tháng')){
    var m=today?today.m:currentMonth;
    var days2=getDays(m).filter(function(d){return d.r==='great'||d.r==='good';});
    days2.sort(function(a,b){return rateDayScore(b.cc.chi,LN[b.m-1])-rateDayScore(a.cc.chi,LN[a.m-1]);});
    if(!days2.length) return 'Tháng '+m+' không có ngày đặc biệt tốt.';
    return 'Top 5 ngày tốt nhất tháng <strong>'+m+' Âm</strong>:<br>'
      +days2.slice(0,5).map(function(d){return '⭐ '+d.dl.getDate()+'/'+(d.dl.getMonth()+1)+' (Ngày '+d.d+'/'+d.m+'🌙) — '+d.cc.can+' '+d.cc.chi+' · '+rateLabel(d.r);}).join('<br>');
  }
  // Ký hợp đồng
  if(q.includes('ký')||q.includes('hợp đồng')){
    var refM=today?today.m:currentMonth;
    var kyDays=getDays(refM).filter(function(d){return activityMatchDay(d,'kyHD');});
    if(!kyDays.length) return 'Tháng '+refM+' không có ngày lý tưởng để ký hợp đồng. Hãy thử tháng khác.';
    return 'Ngày tốt để <strong>ký hợp đồng</strong> trong tháng <strong>'+refM+' Âm</strong>:<br>'
      +kyDays.slice(0,5).map(function(d){return '📝 '+d.dl.getDate()+'/'+(d.dl.getMonth()+1)+' ('+d.d+'/'+d.m+'🌙) — '+rateLabel(d.r);}).join('<br>');
  }
  // Cảnh báo tháng
  if(q.includes('cảnh báo')||q.includes('chú ý')){
    var m2=today?today.m:currentMonth;
    return '⚠ Cảnh báo tháng <strong>'+m2+' Âm</strong>:<br>'+M_OV[m2-1].split('.').slice(0,2).join('.')+'<br><br>Ngày xấu nhất: '
      +getDays(m2).filter(function(d){return d.r==='bad';}).map(function(d){return d.dl.getDate()+'/'+(d.dl.getMonth()+1);}).join(', ');
  }
  // Tháng X thế nào
  var mMatch=q.match(/tháng\s*(\d{1,2})/);
  if(mMatch){
    var mn=parseInt(mMatch[1]);
    if(mn>=1&&mn<=12){
      var sc=M_SCORE[mn-1];
      return '<strong>Tháng '+mn+' Âm</strong> (LN='+LN[mn-1]+') — Điểm: <strong>'+sc+'/10</strong> — '+M_GRADE[mn-1]+'<br><br>'+M_OV[mn-1];
    }
  }
  // Ngày X/Y
  var dateMatch=q.match(/ngày\s*(\d{1,2})[\/\-](\d{1,2})/);
  if(dateMatch){
    var dd=parseInt(dateMatch[1]),mm=parseInt(dateMatch[2]);
    var found2=ALL.find(function(d){return d.dl.getDate()===dd&&d.dl.getMonth()===mm-1;});
    if(found2) return dd+'/'+mm+'/2026 DL = Ngày <strong>'+found2.d+'/'+found2.m+' Âm</strong> · '+found2.cc.can+' '+found2.cc.chi+' · <span style="color:'+rateColor(found2.r)+'">'+rateLabel(found2.r)+'</span>';
    return 'Không tìm thấy ngày '+dd+'/'+mm+'/2026 trong dữ liệu.';
  }
  return 'Tôi chưa hiểu câu hỏi này. Thử hỏi: "hôm nay thế nào", "tháng 9 tốt không", "ngày 15/6 là ngày gì", "ký hợp đồng khi nào tốt"...';
}

// ══════════════════════════════════════════════════════════════
// #1 — NATAL CHART WHEEL (SVG)
// ══════════════════════════════════════════════════════════════
function renderNatalWheel(selectedChiForDay){
  // 12 cung vị trí theo chiều kim đồng hồ bắt đầu từ Dần (1h)
  // Thứ tự địa chi: Tý(12h), Sửu(1h), Dần(2h)... ngược chiều kim
  // Trong Tử Vi, cung Mệnh ở Sửu (đỉnh phải ~30°)
  var CX=150,CY=150,R1=130,R2=90,R3=55;
  var CUNG_ORDER=CUNGS; // ordered by chi position in the wheel
  // Position: chi index → angle (Tý=top=270°, going clockwise)
  function chiAngle(chi){
    var idx=CHI_IDX[chi];
    return (270+idx*30)%360; // Tý at top, clockwise
  }
  function polarXY(angle,r){
    var rad=angle*Math.PI/180;
    return{x:CX+r*Math.cos(rad),y:CY+r*Math.sin(rad)};
  }
  var svg='<svg width="300" height="300" viewBox="0 0 300 300">';
  // Background
  svg+='<circle cx="'+CX+'" cy="'+CY+'" r="140" fill="rgba(15,12,7,.8)" stroke="rgba(200,150,10,.2)" stroke-width="1"/>';
  svg+='<circle cx="'+CX+'" cy="'+CY+'" r="'+R1+'" fill="none" stroke="rgba(200,150,10,.2)" stroke-width="1"/>';
  svg+='<circle cx="'+CX+'" cy="'+CY+'" r="'+R2+'" fill="none" stroke="rgba(200,150,10,.1)" stroke-width="1"/>';
  // Tam phương lines
  var tamPhuong=[[1,5,9],[2,6,10],[3,7,11],[4,8,12]];
  var tpColors=['rgba(46,204,113,.3)','rgba(93,173,226,.3)','rgba(243,156,18,.3)','rgba(155,89,182,.3)'];
  tamPhuong.forEach(function(tp,tpi){
    var pts=tp.map(function(chi_idx){
      var chi=CHI[chi_idx-1>11?chi_idx-1-12:chi_idx-1];
      // find the cung with this chi
      var cung=CUNGS.find(function(c){return CHI_IDX[c.chi]===(chi_idx-1);});
      if(!cung) return null;
      var a=chiAngle(cung.chi);
      return polarXY(a,R2);
    }).filter(Boolean);
    if(pts.length===3) svg+='<polygon points="'+pts.map(function(p){return p.x+','+p.y;}).join(' ')+'" fill="'+tpColors[tpi]+'" stroke="'+tpColors[tpi].replace('.3','.6')+'" stroke-width="1"/>';
  });
  // 12 cung sectors
  CUNGS.forEach(function(c){
    var ang=chiAngle(c.chi);
    var ang1=ang-15, ang2=ang+15;
    var r1=polarXY(ang1*Math.PI/180,R1), r2=polarXY(ang2*Math.PI/180,R1);
    var c1=polarXY(ang1*Math.PI/180,R2), c2=polarXY(ang2*Math.PI/180,R2);
    // Use radians directly
    var a1r=ang1*Math.PI/180, a2r=ang2*Math.PI/180;
    var p1={x:CX+R1*Math.cos(a1r),y:CY+R1*Math.sin(a1r)};
    var p2={x:CX+R1*Math.cos(a2r),y:CY+R1*Math.sin(a2r)};
    var p3={x:CX+R2*Math.cos(a2r),y:CY+R2*Math.sin(a2r)};
    var p4={x:CX+R2*Math.cos(a1r),y:CY+R2*Math.sin(a1r)};
    // Determine fill color
    var fillClr='rgba(26,20,10,.6)';
    if(c.chi==='Sửu') fillClr='rgba(200,150,10,.2)'; // Mệnh
    if(selectedChiForDay){
      var chi=selectedChiForDay;
      if(c.chi===chi) fillClr='rgba(200,150,10,.35)';
      else if(isXung(c.chi,chi)) fillClr='rgba(139,26,18,.25)';
      else if(isTH(c.chi,chi)) fillClr='rgba(26,122,60,.25)';
    }
    svg+='<path d="M'+p1.x+','+p1.y+' A'+R1+','+R1+' 0 0,1 '+p2.x+','+p2.y+' L'+p3.x+','+p3.y+' A'+R2+','+R2+' 0 0,0 '+p4.x+','+p4.y+' Z" fill="'+fillClr+'" stroke="rgba(200,150,10,.25)" stroke-width=".8" style="cursor:pointer" onclick="selectNatalCung(\''+c.chi+'\')" />';
    // Label
    var lp=polarXY(ang*Math.PI/180,(R1+R2)/2);
    svg+='<text x="'+lp.x+'" y="'+lp.y+'" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="rgba(240,230,200,.7)">'+c.ten+'</text>';
    // Chi
    var cp=polarXY(ang*Math.PI/180,R1+10);
    svg+='<text x="'+cp.x+'" y="'+cp.y+'" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="rgba(200,150,10,.8)">'+c.chi+'</text>';
    // Icon
    var ip=polarXY(ang*Math.PI/180,R3);
    svg+='<text x="'+ip.x+'" y="'+ip.y+'" text-anchor="middle" dominant-baseline="middle" font-size="11">'+c.icon+'</text>';
  });
  // Center
  svg+='<circle cx="'+CX+'" cy="'+CY+'" r="40" fill="rgba(15,12,7,.9)" stroke="rgba(200,150,10,.3)" stroke-width="1"/>';
  svg+='<text x="'+CX+'" y="'+(CY-8)+'" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--gold)">Mr. Hoàng</text>';
  svg+='<text x="'+CX+'" y="'+(CY+4)+'" text-anchor="middle" font-size="7.5" fill="rgba(240,230,200,.6)">Mệnh Sửu</text>';
  svg+='<text x="'+CX+'" y="'+(CY+15)+'" text-anchor="middle" font-size="7" fill="rgba(200,150,10,.6)">Hỏa Lục Cục</text>';
  svg+='</svg>';
  return svg;
}

var selectedNatalChi='';
function selectNatalCung(chi){
  selectedNatalChi=chi;
  var cung=CUNGS.find(function(c){return c.chi===chi;});
  var det=document.getElementById('natal-detail');
  if(det&&cung){
    det.innerHTML='<div class="ncl-item sel"><span style="font-size:18px">'+cung.icon+'</span>'
      +'<div><div style="font-size:13px;font-weight:700;color:var(--text)">'+cung.ten+' — '+chi+'</div>'
      +'<div style="font-size:10.5px;color:var(--text3);margin-top:2px">'+cung.sao+'</div>'
      +'<div style="font-size:11px;color:var(--text2);margin-top:4px">✅ '+getNen(cung.ten)+'</div>'
      +'<div style="font-size:11px;color:#ff8a7a;margin-top:2px">⛔ '+getKhong(cung.ten)+'</div></div></div>';
  }
  // Redraw wheel
  var ww=document.getElementById('natal-wheel-svg');
  if(ww) ww.innerHTML=renderNatalWheel(chi);
}

// #8 — SHARE CARD (Canvas)
// ══════════════════════════════════════════════════════════════
function shareDay(){
  if(!selectedDay){alert('Hãy chọn một ngày để chia sẻ.');return;}
  var day=selectedDay,mi=day.m-1,ln=LN[mi],nc=day.cc.chi;
  var dl=day.dl;
  var rc=day.r;
  var best=[],warn2=[];
  CUNGS.forEach(function(c){var r=rateC(c,nc,ln);if(r==='great')best.push(c.ten);if(r==='bad')warn2.push(c.ten);});
  var truc=getTruc(CHI_IDX[nc],mi),than=getThan(CHI_IDX[nc],mi);
  var isHD=isHoangDao(than);
  // Create canvas
  var W=640,H=360;
  var canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');
  // Background gradient
  var grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#0f0c07');grad.addColorStop(1,'#231809');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // Gold border
  ctx.strokeStyle='rgba(200,150,10,.5)';ctx.lineWidth=2;ctx.strokeRect(8,8,W-16,H-16);
  // Header band
  var hGrad=ctx.createLinearGradient(0,0,W,0);
  hGrad.addColorStop(0,'rgba(200,150,10,.15)');hGrad.addColorStop(1,'transparent');
  ctx.fillStyle=hGrad;ctx.fillRect(8,8,W-16,60);
  // Title
  ctx.fillStyle='#c8960a';ctx.font='bold 13px sans-serif';ctx.fillText('🔮 TỬ VI MR. HOÀNG — NĂM BÍNH NGỌ 2026',24,32);
  // Date big
  ctx.fillStyle='#f0e6cc';ctx.font='bold 52px serif';
  ctx.fillText(dl.getDate()+'/'+(dl.getMonth()+1)+'/2026',24,110);
  // Lunar date
  ctx.fillStyle='#c8960a';ctx.font='bold 18px sans-serif';
  ctx.fillText('Ngày '+day.d+'/'+day.m+' Âm  ·  '+day.cc.can+' '+day.cc.chi,24,140);
  // Rating
  var rcColors={'great':'#2ecc71','good':'#5dade2','mid':'#636363','warn':'#f39c12','bad':'#e74c3c'};
  ctx.fillStyle=rcColors[rc]||'#888';ctx.font='bold 16px sans-serif';
  ctx.fillText(rateLabel(rc),24,172);
  // Truc/Than
  ctx.fillStyle='rgba(240,230,200,.7)';ctx.font='12px sans-serif';
  ctx.fillText(truc+' · '+(isHD?'☀ Hoàng Đạo':'🌑 Hắc Đạo')+' · '+than,24,196);
  // Best cungs
  if(best.length){ctx.fillStyle='#5dbd77';ctx.font='11px sans-serif';ctx.fillText('Cung tốt: '+best.slice(0,4).join(', '),24,220);}
  if(warn2.length){ctx.fillStyle='#ff8a7a';ctx.font='11px sans-serif';ctx.fillText('Cẩn thận: '+warn2.join(', '),24,240);}
  // Nên làm
  var topCung=best.length?best[0]:'Mệnh';
  ctx.fillStyle='rgba(240,230,200,.6)';ctx.font='11px sans-serif';
  ctx.fillText('✅ '+getNen(topCung),24,266);
  // Divider line
  ctx.strokeStyle='rgba(200,150,10,.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(24,280);ctx.lineTo(W-24,280);ctx.stroke();
  // Watermark
  ctx.fillStyle='rgba(200,150,10,.4)';ctx.font='10px sans-serif';ctx.textAlign='right';
  ctx.fillText('huyen-haru.github.io/Tuvi-Mr-Hoang-2026',W-24,H-16);
  // Download
  var link=document.createElement('a');
  link.download='TuVi_'+dl.getDate()+'-'+(dl.getMonth()+1)+'-2026.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}

  h+='<button onclick="jExport()" style="padding:5px 11px;border-radius:14px;font-size:11px;font-weight:600;background:var(--bg2);border:1px solid var(--border2);color:var(--text2);cursor:pointer">📤 Xuất nhật ký</button>';
  h+='</div>';
  h+='</div>';
  return h;
}
function jSetOutcome(key,v){
  var j=loadJournal();if(!j[key])j[key]={note:'',outcome:'',tags:[]};
  j[key].outcome=v;try{localStorage.setItem(JOURNAL_KEY,JSON.stringify(j));}catch(e){}
  // Update UI
  ['great','good','mid','warn','bad'].forEach(function(o){
    var el=document.getElementById('jo-'+o+'-'+key);
    if(el){var on=o===v;el.className='j-outcome'+(on?' on':'');el.style.background=on?{'great':'#2ecc71','good':'#5dade2','mid':'#888','warn':'#f39c12','bad':'#e74c3c'}[o]:'';el.style.borderColor=on?el.style.background:'';}
  });
}
function jToggleTag(key,tag){
  var j=loadJournal();if(!j[key])j[key]={note:'',outcome:'',tags:[]};
  if(!j[key].tags)j[key].tags=[];
  var idx=j[key].tags.indexOf(tag);
  if(idx>=0)j[key].tags.splice(idx,1);else j[key].tags.push(tag);
  try{localStorage.setItem(JOURNAL_KEY,JSON.stringify(j));}catch(e){}
  var el=document.getElementById('jt-'+tag.replace('-','_')+'-'+key);
  if(el)el.className='j-tag'+(j[key].tags.indexOf(tag)>=0?' on':'');
}
function jSave(key){
  var ta=document.getElementById('j-note-'+key);
  var j=loadJournal();if(!j[key])j[key]={note:'',outcome:'',tags:[]};
  j[key].note=ta?ta.value:'';
  try{localStorage.setItem(JOURNAL_KEY,JSON.stringify(j));}catch(e){}
  var btn=event.target;if(btn){btn.textContent='✓ Đã lưu';setTimeout(function(){btn.textContent='💾 Lưu';},1500);}
}
function jExport(){
  var j=loadJournal();
  var blob=new Blob([JSON.stringify(j,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='NhatKyTuVi_MrHoang_2026.json';a.click();
}

function getCungEvent(c, nc, ln){
  var ev=CUNG_EV[c.ten]; if(!ev) return '';
  var cn=c.chi;
  if(cn===nc) return ev.kic;
  if(isXung(cn,nc)) return ev.xun;
  if(isTH(cn,nc)) return ev.tha;
  if(LUC_HOP[cn]===nc) return ev.lho;
  return ev.bin;
}

function getCungMonthPred(c, ln){
  var ev=CUNG_MONTH_EV[c.ten]; if(!ev) return getNen(c.ten);
  var cn=c.chi;
  if(cn===ln) return ev.kic;
  if(isXung(cn,ln)) return ev.xun;
  if(isTH(cn,ln)) return ev.tha;
  if(LUC_HOP[cn]===ln) return ev.lho;
  return ev.bin;
}

// Generate full day narrative summary
function getDaySummary(day, truc, than){
  var nc=day.cc.chi, ln=LN[day.m-1];
  var isHD=isHoangDao(than);
  var trucType=TRUC_TYPE[truc];

  // Identify key activated/pressured cungs by today's chi
  var dayPos=[], dayNeg=[];
  CUNGS.forEach(function(c){
    var cn=c.chi;
    if(cn===nc){
      if(!c.hung) dayPos.push(c);
      else dayNeg.push(c);
    } else if(isXung(cn,nc)){
      if(c.hung) dayNeg.push(c); else dayNeg.push(c);
    } else if(isTH(cn,nc)&&!c.hung){
      dayPos.push(c);
    }
  });
  // Deduplicate
  var seen={};
  dayPos=dayPos.filter(function(c){if(seen[c.ten])return false;seen[c.ten]=1;return true;});
  var seen2={};
  dayNeg=dayNeg.filter(function(c){if(seen2[c.ten])return false;seen2[c.ten]=1;return true;});

  var h='<div class="day-predict">';
  // Trực + Thần badge line
  h+='<div class="dp-truc-line">';
  h+='<span class="dp-truc-badge '+(trucType==='good'?'truc-g':trucType==='bad'?'truc-r':'truc-o')+'">'+truc+'</span>';
  h+='<span class="dp-than-badge '+(isHD?'than-g':'than-r')+'">'+(isHD?'☀ Hoàng Đạo':'🌑 Hắc Đạo')+' — '+than+'</span>';
  h+='<span class="dp-adv">'+TRUC_ADV[truc]+'</span>';
  h+='</div>';

  if(dayPos.length||dayNeg.length){
    h+='<div class="dp-events-grid">';
    if(dayPos.length){
      h+='<div class="dp-events-col pos">';
      h+='<div class="dpe-hdr">✅ Phát sáng hôm nay — nên làm</div>';
      dayPos.slice(0,4).forEach(function(c){
        h+='<div class="dpe-item">'+c.icon+' <strong>'+c.ten+'</strong> — '+getCungEvent(c,nc,ln)+'</div>';
      });
      h+='</div>';
    }
    if(dayNeg.length){
      h+='<div class="dp-events-col neg">';
      h+='<div class="dpe-hdr">⚠ Cần thận trọng hôm nay</div>';
      dayNeg.slice(0,3).forEach(function(c){
        h+='<div class="dpe-item">'+c.icon+' <strong>'+c.ten+'</strong> — '+getCungEvent(c,nc,ln)+'</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function render(){
  updateBreadcrumb();
  updateTabs();
  updateSidebar();
  renderTodayCard();
  if(view==='year')       renderYear();
  else if(view==='solar') renderSolarCal();
  else if(view==='month') renderMonth();
  else if(view==='week')  renderWeek();
  else if(view==='day')   renderDay();
  else if(view==='ceo')   renderCEOMode();
  else if(view==='natal') renderNatalWheelView();
  // Update sidebar active (only for lunar mode)
  if(!solarMode){
    document.querySelectorAll('.mi').forEach(function(el){el.classList.remove('on');});
    if(view!=='year'){var si=document.getElementById('si-'+currentMonth);if(si){si.classList.add('on');si.scrollIntoView({block:'nearest'});}}
  }
}

// Init — auto-detect week from selectedDay or today
(function(){
  var now=new Date();
  for(var i=11;i>=0;i--){if(now>=M_START[i]){currentMonth=i+1;break;}}
  // Set week to current week
  var days=getDays(currentMonth);
  for(var di=0;di<days.length;di++){
    if(days[di].dl.getDate()===now.getDate()&&days[di].dl.getMonth()===now.getMonth()){
      currentWeek=Math.floor(di/7); break;
    }
  }
  view='year';
  render();
})();
