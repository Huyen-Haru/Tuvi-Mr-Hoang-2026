<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lịch Tử Vi 2026 — Mr. Hoàng</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,600;1,400&display=swap');
:root{
  --bg:#0f0c07;--bg2:#1a1208;--bg3:#231809;--bg4:#2e200c;
  --gold:#c8960a;--gold-lt:#f5e9c4;--gold-dim:rgba(200,150,10,.15);
  --amber:#7d5a0a;--text:#f0e6cc;--text2:#c8b882;--text3:#7d6a4a;
  --border:rgba(200,150,10,.25);--border2:rgba(200,150,10,.12);
  --cg:#1a7a3c;--cg2:rgba(26,122,60,.18);
  --cb:#1a5276;--cb2:rgba(26,82,118,.18);
  --cm:#3a3530;--cm2:rgba(58,53,48,.4);
  --cw:#7d4400;--cw2:rgba(125,68,0,.2);
  --cr:#8b1a12;--cr2:rgba(139,26,18,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.6;min-height:100vh}
a{color:var(--gold);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* ── TOPBAR ── */
.tb{position:sticky;top:0;z-index:200;background:rgba(15,12,7,.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border2);padding:8px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.tb-brand{font-family:'Noto Serif',serif;font-size:15px;color:var(--gold);white-space:nowrap}
.tb-sub{font-size:10px;color:var(--text3);margin-top:1px}
.tb-nav{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* ── BREADCRUMB ── */
.bc{display:flex;align-items:center;gap:4px;font-size:11.5px;padding:8px 16px;
  background:var(--bg2);border-bottom:1px solid var(--border2);flex-wrap:wrap}
.bc-item{color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .12s}
.bc-item:hover{background:var(--gold-dim);color:var(--text)}
.bc-item.active{color:var(--gold);font-weight:600}
.bc-sep{color:var(--text3);opacity:.4;font-size:10px}

/* ── VIEW TABS ── */
.view-tabs{display:flex;gap:0;background:var(--bg3);border-bottom:1px solid var(--border2);overflow-x:auto}
.view-tabs::-webkit-scrollbar{display:none}
.vtab{padding:10px 18px;font-size:12px;font-weight:600;color:var(--text3);
  background:transparent;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.vtab.active{color:var(--gold);border-bottom-color:var(--gold)}
.vtab:hover:not(.active){color:var(--text2);background:var(--gold-dim)}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 120px)}
@media(max-width:720px){.layout{grid-template-columns:1fr}.sidebar{display:none}}
.sidebar{background:var(--bg2);border-right:1px solid var(--border2);
  position:sticky;top:110px;height:calc(100vh - 110px);overflow-y:auto;padding:12px 0}
.sb-title{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--text3);
  text-transform:uppercase;padding:0 14px 8px}
.mi{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;
  border-left:3px solid transparent;transition:all .12s}
.mi:hover{background:var(--gold-dim)}
.mi.on{background:var(--gold-dim);border-left-color:var(--gold)}
.mi-n{font-family:'Noto Serif',serif;font-size:18px;color:var(--text3);min-width:26px;text-align:center}
.mi.on .mi-n{color:var(--gold)}
.mi-info{flex:1}
.mi-name{font-size:11.5px;font-weight:600;color:var(--text)}
.mi-chi{font-size:10px;color:var(--text3)}
.mi-sc{font-size:11px;font-weight:700;padding:1px 6px;border-radius:8px}
.sgreen{background:var(--cg);color:#fff}.sblue{background:var(--cb);color:#fff}
.sgray{background:var(--cm);color:#ccc}.swarn{background:#c8960a;color:#fff}.sred{background:var(--cr);color:#fff}

.main{padding:18px 18px 60px}

/* ── COMMON ── */
.sec-hdr{font-family:'Noto Serif',serif;font-size:14px;font-weight:600;color:var(--gold);
  border-left:3px solid var(--gold);padding:6px 12px;background:var(--gold-dim);
  border-radius:0 5px 5px 0;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:9px;overflow:hidden}
.divider{height:1px;background:var(--border2);margin:18px 0}
.badge{padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700}
.bg-great{background:var(--cg);color:#fff}.bg-good{background:var(--cb);color:#fff}
.bg-mid{background:var(--cm);color:#ccc}.bg-warn{background:#c8960a;color:#fff}.bg-bad{background:var(--cr);color:#fff}
.row-grid{display:grid;gap:10px}

/* ── YEAR VIEW ── */
.year-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.ys-card{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;border-left:3px solid}
.ys-card.g{border-left-color:#2ecc71}.ys-card.r{border-left-color:#e74c3c}.ys-card.y{border-left-color:#f39c12}.ys-card.b{border-left-color:#5dade2}
.ys-lbl{font-size:10px;font-weight:700;letter-spacing:.3px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.ys-val{font-size:12.5px;color:var(--text);line-height:1.6}

.month-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:20px}
.mc{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  padding:10px 12px;cursor:pointer;transition:all .15s;border-left:3px solid var(--border2)}
.mc:hover{background:var(--bg4);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.mc.great{border-left-color:#2ecc71}.mc.good{border-left-color:#5dade2}
.mc.mid{border-left-color:#636363}.mc.warn{border-left-color:#f39c12}.mc.bad{border-left-color:#e74c3c}
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.mc-num{font-family:'Noto Serif',serif;font-size:22px;font-weight:600;color:var(--text3)}
.mc-chi{font-size:10px;color:var(--text3);font-weight:600}
.mc-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px}
.mc-date{font-size:10px;color:var(--text3);margin-bottom:5px}
.mc-bar{height:4px;border-radius:2px;background:var(--border2);overflow:hidden;margin-bottom:5px}
.mc-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.mc-tag{font-size:10px;color:var(--text3);line-height:1.4}

.year-heatmap{margin-bottom:20px}
.hm-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;margin-bottom:6px}
.hm-cell{height:6px;border-radius:1px;cursor:pointer;transition:opacity .12s}
.hm-cell:hover{opacity:.7}

/* ── MONTH VIEW ── */
.month-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  flex-wrap:wrap;margin-bottom:18px}
.mt-main h2{font-family:'Noto Serif',serif;font-size:19px;color:var(--gold);margin-bottom:4px}
.mt-meta{font-size:11.5px;color:var(--text3);margin-bottom:8px}
.mt-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--bg3);color:var(--text2)}
.chip-g{background:rgba(26,122,60,.2);border-color:rgba(26,122,60,.4);color:#5dbd77}
.chip-r{background:rgba(139,26,18,.2);border-color:rgba(139,26,18,.4);color:#ff8a7a}
.chip-y{background:var(--gold-dim);border-color:var(--border);color:var(--gold)}
.mt-score-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:10px 16px;text-align:center;min-width:80px;flex-shrink:0}
.ms-big{font-family:'Noto Serif',serif;font-size:28px;font-weight:700;line-height:1}
.ms-sub{font-size:10px;color:var(--text3);margin-top:3px}

.stats5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:18px}
@media(max-width:480px){.stats5{grid-template-columns:repeat(3,1fr)}}
.s5{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;
  padding:8px 6px;text-align:center}
.s5-n{font-size:20px;font-weight:700;line-height:1;margin-bottom:2px}
.s5-l{font-size:9.5px;color:var(--text3)}

/* 12 cung tháng */
.cung-month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;margin-bottom:20px}
.cm-card{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;
  border-left:3px solid;cursor:pointer;transition:all .12s}
.cm-card:hover{background:var(--bg4)}
.cm-hdr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cm-icon{font-size:16px}
.cm-name{font-size:12px;font-weight:700;color:var(--text)}
.cm-chi{font-size:10px;color:var(--gold);font-weight:700;margin-left:1px}
.cm-score{margin-left:auto;font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px}
.cm-bar-row{display:flex;gap:2px;height:5px;border-radius:3px;overflow:hidden;margin-bottom:6px}
.cm-bar-seg{height:100%;min-width:2px;transition:flex .3s}
.seg-great{background:#2ecc71}.seg-good{background:#5dade2}.seg-mid{background:#636363}
.seg-warn{background:#f39c12}.seg-bad{background:#e74c3c}
.cm-body{font-size:11px;color:var(--text3);line-height:1.55}
.cm-strong{font-size:11px;color:var(--text2);font-weight:600;margin-top:3px}

/* Tuần cards */
.week-cards{display:grid;gap:8px;margin-bottom:18px}
.wk{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  overflow:hidden;cursor:pointer;transition:all .12s}
.wk:hover{border-color:var(--gold)}
.wk.on{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.wk-hdr{display:flex;align-items:center;gap:10px;padding:9px 13px;
  background:var(--bg4);border-bottom:1px solid var(--border2)}
.wk-num{font-family:'Noto Serif',serif;font-size:16px;font-weight:600;
  color:var(--gold);min-width:22px}
.wk-info{flex:1}
.wk-title{font-size:12px;font-weight:600;color:var(--text)}
.wk-sub{font-size:10.5px;color:var(--text3)}
.wk-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px}
.wk-arrow{color:var(--text3);transition:transform .2s;font-size:13px}
.wk.on .wk-arrow{transform:rotate(90deg)}
.wk-body{padding:10px 13px;display:none}
.wk.on .wk-body{display:block}
.wk-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
@media(max-width:500px){.wk-days{grid-template-columns:repeat(4,1fr)}}
.wd{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;
  padding:5px 4px;text-align:center;cursor:pointer;transition:all .12s}
.wd:hover{border-color:var(--gold)}
.wd.sel{border-color:var(--gold);background:var(--gold-dim)}
.wd.r-great{background:var(--cg2);border-color:rgba(26,122,60,.3)}
.wd.r-good{background:var(--cb2);border-color:rgba(26,82,118,.3)}
.wd.r-warn{background:var(--cw2);border-color:rgba(125,68,0,.3)}
.wd.r-bad{background:var(--cr2);border-color:rgba(139,26,18,.3)}
.wd-d{font-size:14px;font-weight:700;color:var(--text);line-height:1}
.wd-dl{font-size:9px;color:var(--text3)}
.wd-cc{font-size:9px;color:var(--text3)}
.wd-dot{width:5px;height:5px;border-radius:50%;margin:2px auto 0}
.wd.empty{visibility:hidden}
.wk-sum{font-size:11.5px;color:var(--text2);line-height:1.6;padding:8px 0}

/* ── CALENDAR ── */
.cal-wrap{background:var(--bg2);border:1px solid var(--border2);border-radius:9px;
  overflow:hidden;margin-bottom:18px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);
  background:var(--bg3);border-bottom:1px solid var(--border2)}
.cal-dow div{text-align:center;padding:7px 2px;font-size:10px;font-weight:700;
  color:var(--text3);letter-spacing:.3px}
.cal-dow div:last-child{color:#d4875a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border2)}
.dc{background:var(--bg2);padding:5px 3px 4px;text-align:center;cursor:pointer;
  transition:all .1s;position:relative;min-height:58px;
  display:flex;flex-direction:column;align-items:center;gap:1px}
.dc:hover:not(.empty){background:var(--bg4);z-index:1}
.dc.sel{background:var(--gold-dim)!important;box-shadow:inset 0 0 0 2px var(--gold);z-index:2}
.dc.empty{background:var(--bg);cursor:default}
.dc.r-great{background:var(--cg2)}.dc.r-good{background:var(--cb2)}
.dc.r-warn{background:var(--cw2)}.dc.r-bad{background:var(--cr2)}
.dc-d{font-size:14px;font-weight:700;color:var(--text);line-height:1}
.dc-dl{font-size:8.5px;color:var(--text3)}
.dc-cc{font-size:8.5px;color:var(--text3)}
.dc-dot{width:5px;height:5px;border-radius:50%;margin-top:1px;flex-shrink:0}
.dot-great{background:#2ecc71}.dot-good{background:#5dade2}
.dot-mid{background:#636363}.dot-warn{background:#f39c12}.dot-bad{background:#e74c3c}
.dc.wknd .dc-d{color:#d4875a}
.no-show{opacity:.2;pointer-events:none}

/* ── DAY DETAIL ── */
.day-panel{background:var(--bg2);border:1px solid var(--border);border-radius:9px;
  overflow:hidden;margin-bottom:18px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.dp-hdr{padding:14px 18px;background:linear-gradient(90deg,var(--bg3),var(--bg2));
  border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.dp-date{font-family:'Noto Serif',serif;font-size:24px;font-weight:600;color:var(--gold);line-height:1}
.dp-info{flex:1}
.dp-cc{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.dp-dl{font-size:11px;color:var(--text3)}
.dp-body{padding:14px 16px}
.cung-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px;margin-bottom:12px}
.cc-card{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;
  padding:9px 11px;border-left:3px solid var(--border2)}
.cc-card.great{border-left-color:#2ecc71;background:rgba(26,122,60,.1)}
.cc-card.good{border-left-color:#5dade2;background:rgba(26,82,118,.1)}
.cc-card.warn{border-left-color:#f39c12;background:rgba(125,68,0,.1)}
.cc-card.bad{border-left-color:#e74c3c;background:rgba(139,26,18,.1)}
.cc-hdr{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.cc-ico{font-size:13px}
.cc-nm{font-size:11.5px;font-weight:700;color:var(--text)}
.cc-ch{font-size:10px;color:var(--gold);font-weight:700;margin-left:2px}
.cc-sc{margin-left:auto;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700}
.cc-sao{font-size:9.5px;color:var(--text3);font-style:italic;margin-bottom:4px;line-height:1.4}
.cc-rels{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px}
.rel{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;background:rgba(255,255,255,.05)}
.cc-nx{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:4px}
.cc-nen{font-size:10.5px;color:#5dbd77}
.cc-khong{font-size:10.5px;color:#ff8a7a;margin-top:2px}
.day-ov{padding:10px 14px;border-radius:7px;border-left:3px solid;font-size:12px;line-height:1.7;margin-top:10px}
.ov-title{font-weight:700;margin-bottom:3px;color:var(--text)}

/* ── FILTER BAR ── */
.fbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.fbar-lbl{font-size:10.5px;color:var(--text3);font-weight:600;margin-right:2px}
.fb{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
  border:1px solid var(--border2);background:transparent;color:var(--text3);transition:all .12s}
.fb.on{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}
.fb:hover{background:var(--gold-dim);color:var(--text2)}

/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--text3);margin-bottom:12px}
.leg{display:flex;align-items:center;gap:4px}
.leg-d{width:8px;height:8px;border-radius:2px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="tb">
  <div>
    <div class="tb-brand">🔮 Tử Vi Mr. Hoàng — Năm Bính Ngọ 2026</div>
    <div class="tb-sub">Đại Vận Bính Tuất · Hạn La Hầu · Mệnh Sửu · Thiên Cơ Đắc</div>
  </div>
  <div class="tb-nav">
    <button onclick="toggleSolar()" id="solar-btn" style="padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;border:1px solid var(--border);color:var(--text2);background:var(--bg3);transition:all .15s">☀ Dương Lịch</button>
    <a href="index.html" style="padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;border:1px solid var(--border);color:var(--text2);background:var(--bg3)">← Trang chủ</a>
  </div>
</div>

<!-- BREADCRUMB -->
<div class="bc" id="bc">
  <span class="bc-item active" onclick="goYear()">🏠 Cả Năm 2026</span>
</div>

<!-- VIEW TABS -->
<div class="view-tabs">
  <button class="vtab" id="vt-year" onclick="goYear()">🌟 Tổng Quan Năm</button>
  <button class="vtab" id="vt-solar" onclick="goSolarMonth(currentSolarMonth)" style="display:none">☀ Dương Lịch <span id="vt-s-lbl"></span></button>
  <button class="vtab" id="vt-month" onclick="goMonth(currentMonth)" style="display:none">🌙 Tháng <span id="vt-m-lbl"></span></button>
  <button class="vtab" id="vt-week" onclick="goWeek(currentWeek)" style="display:none">📆 Tuần <span id="vt-w-lbl"></span></button>
  <button class="vtab" id="vt-day" onclick="goDay(selectedDay)" style="display:none">📋 Ngày <span id="vt-d-lbl"></span></button>
</div>

<!-- LAYOUT -->
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<script>
'use strict';
// ══════════════════════════════════════════════════════════════
// CORE DATA
// ══════════════════════════════════════════════════════════════
var CAN=['Giáp','Ất','Bính','Đinh','Mậu','Kỷ','Canh','Tân','Nhâm','Quý'];
var CHI=['Tý','Sửu','Dần','Mão','Thìn','Tị','Ngọ','Mùi','Thân','Dậu','Tuất','Hợi'];
var DOW_VN=['CN','T2','T3','T4','T5','T6','T7'];
var CHI_IDX={}; CHI.forEach(function(c,i){CHI_IDX[c]=i;});
var LUC_HOP={Tý:'Sửu',Sửu:'Tý',Dần:'Hợi',Hợi:'Dần',Mão:'Tuất',Tuất:'Mão',Thìn:'Dậu',Dậu:'Thìn',Tị:'Thân',Thân:'Tị',Ngọ:'Mùi',Mùi:'Ngọ'};
var TAM_HOP=[[2,6,10],[5,9,1],[8,0,4],[11,3,7]];
function isXung(a,b){return Math.abs(CHI_IDX[a]-CHI_IDX[b])===6;}
function isTH(a,b){var i=CHI_IDX[a],j=CHI_IDX[b];for(var g=0;g<4;g++)if(TAM_HOP[g].indexOf(i)>=0&&TAM_HOP[g].indexOf(j)>=0)return true;return false;}

var CUNGS=[

var BASE_DATE=new Date(2026,0,29);
function getCC(d){
  var n=Math.round((d-BASE_DATE)/86400000);
  return{can:CAN[(4+n%10+600)%10],chi:CHI[(8+n%12+600)%12]};
}

function rateC(c,nc,ln){
  var s=0,h=c.hung,t=c.tot,cn=c.chi;
  if(cn===nc) s+=h?-3:3; if(isXung(cn,nc)) s-=h?2:3; if(isTH(cn,nc)) s+=h?-1:2; if(LUC_HOP[cn]===nc) s+=1;
  if(cn===ln) s+=h?-3:2; if(isXung(cn,ln)) s-=h?2:2; if(isTH(cn,ln)) s+=h?-1:2;
  if(t) s+=1;
  return s>=5?'great':s>=3?'good':s>=-1?'mid':s>=-3?'warn':'bad';
}
function rateDay(nc,ln){
  var t=0;
  CUNGS.forEach(function(c){var r=rateC(c,nc,ln);t+=r==='great'?2:r==='good'?1:r==='mid'?0:r==='warn'?-1:-2;});
  return t>=8?'great':t>=4?'good':t>=-4?'mid':t>=-8?'warn':'bad';
}
function rateLabel(r){return r==='great'?'⭐ Rất Tốt':r==='good'?'✅ Tốt':r==='mid'?'〰 Trung Bình':r==='warn'?'⚠ Cẩn Thận':'🔴 Xấu';}
function rateBadge(r){return'bg-'+r;}
function rateColor(r){return r==='great'?'#2ecc71':r==='good'?'#5dade2':r==='mid'?'#636363':r==='warn'?'#f39c12':'#e74c3c';}

// Pre-compute all days
var ALL=[];
for(var mi=0;mi<12;mi++){
  for(var di=0;di<M_DAYS[mi];di++){
    var dl=new Date(M_START[mi].getTime()+di*86400000);
    var cc=getCC(dl);
    ALL.push({m:mi+1,d:di+1,dl:dl,cc:cc,r:rateDay(cc.chi,LN[mi])});
  }
}

function getDays(m){return ALL.filter(function(d){return d.m===m;});}
function getDay(m,d){return ALL.find(function(x){return x.m===m&&x.d===d;});}

// ── Solar (Dương Lịch) helpers ──
var SOL_M_NAME=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
function getSolarDays(solM){return ALL.filter(function(d){return d.dl.getMonth()===solM;});}
function lookupBySolar(solM,solD){return ALL.find(function(d){return d.dl.getMonth()===solM&&d.dl.getDate()===solD;});}
function getSolarScore(solM){
  var days=getSolarDays(solM);if(!days.length)return 5;
  var t=0;days.forEach(function(d){t+=d.r==='great'?4:d.r==='good'?3:d.r==='mid'?2:d.r==='warn'?1:0;});
  return Math.min(10,Math.round(t/days.length*2.5));
}

// Month palace stats
function palaceMonthStat(mi){
  var ln=LN[mi],stat={};
  CUNGS.forEach(function(c){stat[c.chi]={great:0,good:0,mid:0,warn:0,bad:0,score:0};});
  for(var di=0;di<M_DAYS[mi];di++){
    var dl=new Date(M_START[mi].getTime()+di*86400000);
    var nc=getCC(dl).chi;
    CUNGS.forEach(function(c){
      var r=rateC(c,nc,ln);
      stat[c.chi][r]++;
      stat[c.chi].score+=r==='great'?4:r==='good'?3:r==='mid'?2:r==='warn'?1:0;
    });
  }
  return stat;
}

// Weeks within a month (7-day blocks)
function getWeeks(m){
  var days=getDays(m),nw=Math.ceil(days.length/7),weeks=[];
  for(var w=0;w<nw;w++) weeks.push(days.slice(w*7,w*7+7));
  return weeks;
}
function weekOverallRating(wdays){
  var cnt={great:0,good:0,mid:0,warn:0,bad:0};
  wdays.forEach(function(d){cnt[d.r]++;});
  if(cnt.great+cnt.good>cnt.mid+cnt.warn+cnt.bad) return cnt.great>cnt.good?'great':'good';
  if(cnt.bad+cnt.warn>cnt.great+cnt.good) return cnt.bad>cnt.warn?'bad':'warn';
  return 'mid';
}

function scoreClass(s){return s>=8?'sgreen':s>=7?'sblue':s>=6?'sgray':s>=5?'swarn':'sred';}

  h+='</div><div class="cal-grid">';

  for(var p=0;p<pad2;p++) h+='<div class="dc empty"></div>';
  days.forEach(function(day){

    h+='<div class="dc-cc">'+day.cc.chi+'</div>';
    h+='<div class="dc-dot dot-'+day.r+'"></div></div>';

// ══════════════════════════════════════════════════════════════
// VIEW: WEEK
// ══════════════════════════════════════════════════════════════
function renderWeek(){
  var mi=currentMonth-1;
  var ln=LN[mi];
  var weeks=getWeeks(currentMonth);
  var wdays=weeks[currentWeek]||weeks[0];
  if(!wdays||!wdays.length){goMonth(currentMonth);return;}
  var d1=wdays[0],dN=wdays[wdays.length-1];
  var wr=weekOverallRating(wdays);

  var h='';
  // Header
  h+='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">';
  h+='<div>';
  h+='<div style="font-family:Noto Serif,serif;font-size:18px;color:var(--gold);margin-bottom:4px">Tuần '+(currentWeek+1)+' — Tháng '+currentMonth+' Âm ('+M_NAME[mi]+')</div>';
  h+='<div style="font-size:11.5px;color:var(--text3)">Ngày '+d1.d+'–'+dN.d+' tháng '+currentMonth+' âm · '+dlStr(d1.dl)+' – '+dlStr(dN.dl)+'/2026</div>';
  h+='</div>';
  h+='<span class="badge '+rateBadge(wr)+'" style="font-size:12px;padding:4px 12px">'+rateLabel(wr)+'</span>';
  h+='</div>';

  // Week navigation
  h+='<div style="display:flex;gap:6px;margin-bottom:16px">';
  if(currentWeek>0) h+='<button onclick="goWeek('+(currentWeek-1)+')" style="padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--text2)">← Tuần '+(currentWeek)+'</button>';
  if(currentWeek<weeks.length-1) h+='<button onclick="goWeek('+(currentWeek+1)+')" style="padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--text2)">Tuần '+(currentWeek+2)+' →</button>';
  h+='<button onclick="goMonth('+currentMonth+')" style="padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;background:var(--gold-dim);border:1px solid var(--border);color:var(--gold)">↑ Tháng '+currentMonth+'</button>';
  h+='</div>';

  h+='<div class="divider"></div>';

  // Each day of the week — full cards
  wdays.forEach(function(day){
    var rc=day.r,cc=day.cc,nc=cc.chi;
    var sel=(selectedDay&&selectedDay.m===day.m&&selectedDay.d===day.d);
    var wknd=day.dl.getDay()===0||day.dl.getDay()===6;

    h+='<div style="background:var(--bg2);border:1px solid '+(sel?'var(--gold)':'var(--border2)')+';border-radius:9px;overflow:hidden;margin-bottom:10px;border-left:4px solid '+rateColor(rc)+'">';
    // Day row header
    h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg3);cursor:pointer" onclick="goDay(getDay('+day.m+','+day.d+'))">';
    h+='<div style="font-family:Noto Serif,serif;font-size:20px;font-weight:700;color:'+(wknd?'#d4875a':'var(--gold)')+'">'+day.d+'</div>';
    h+='<div style="flex:1">';
    h+='<div style="font-size:13px;font-weight:600;color:var(--text)">'+cc.can+' '+cc.chi+' · '+dlFull(day.dl)+'</div>';
    h+='<div style="font-size:11px;color:var(--text3)">Tháng '+day.m+' Âm · Lưu Nguyệt: '+ln+'</div>';
    h+='</div>';
    h+='<span class="badge '+rateBadge(rc)+'">'+rateLabel(rc)+'</span>';
    h+='<span style="color:var(--text3);font-size:12px">› Chi tiết</span>';
    h+='</div>';

    // Quick 12-cung summary for the day (compact)
    h+='<div style="padding:10px 14px">';
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:5px">';
    CUNGS.forEach(function(c){
      var cr=rateC(c,nc,ln);
      var cc2=rateColor(cr);
      var bg=cr==='great'?'rgba(26,122,60,.1)':cr==='good'?'rgba(26,82,118,.1)':cr==='warn'?'rgba(125,68,0,.1)':cr==='bad'?'rgba(139,26,18,.1)':'var(--bg3)';
      h+='<div style="background:'+bg+';border:1px solid rgba(255,255,255,.06);border-left:2px solid '+cc2+';border-radius:5px;padding:5px 7px;cursor:pointer" onclick="goDay(getDay('+day.m+','+day.d+'))">';
      h+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">';
      h+='<span style="font-size:11px">'+c.icon+'</span>';
      h+='<span style="font-size:11px;font-weight:700;color:var(--text)">'+c.ten+'</span>';
      h+='<span style="font-size:9px;font-weight:700;padding:1px 4px;border-radius:4px;margin-left:auto;background:'+cc2+';color:'+(cr==='mid'?'#ccc':'#fff')+'">'+rateLabel(cr).split(' ')[0]+'</span>';
      h+='</div>';
      // Short NX
      var rels=[];
      if(c.chi===nc) rels.push('kích'); if(isXung(c.chi,nc)) rels.push('xung'); if(isTH(c.chi,nc)) rels.push('tam hợp');
      if(c.chi===ln) rels.push('LN'); if(isXung(c.chi,ln)) rels.push('LN xung'); if(isTH(c.chi,ln)) rels.push('LN hợp');
      h+='<div style="font-size:9.5px;color:var(--text3)">'+( rels.length?rels.join(' · '):'Bình thường' )+'</div>';
      h+='</div>';
    });
    h+='</div></div></div>';
  });

  document.getElementById('main').innerHTML=h;
}

// ══════════════════════════════════════════════════════════════
// VIEW: DAY
// ══════════════════════════════════════════════════════════════
function renderDay(){
  if(!selectedDay){goMonth(currentMonth);return;}
  var day=selectedDay,mi=day.m-1,ln=LN[mi],nc=day.cc.chi;
  var rc=day.r,sc=rateColor(rc);

  var h='';

  // Day nav
  var prevD=getDay(day.m,day.d-1)||getDay(day.m-1,M_DAYS[day.m-2]);
  var nextD=getDay(day.m,day.d+1)||getDay(day.m+1,1);
  h+='<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">';
  if(prevD) h+='<button onclick="goDay(getDay('+prevD.m+','+prevD.d+'))" style="padding:5px 11px;border-radius:16px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--text2)">← '+prevD.d+'/'+prevD.m+'</button>';
  if(nextD) h+='<button onclick="goDay(getDay('+nextD.m+','+nextD.d+'))" style="padding:5px 11px;border-radius:16px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--text2)">'+nextD.d+'/'+nextD.m+' →</button>';
  h+='<button onclick="goWeek('+currentWeek+')" style="padding:5px 11px;border-radius:16px;font-size:11px;font-weight:600;background:var(--gold-dim);border:1px solid var(--border);color:var(--gold)">↑ Tuần '+(currentWeek+1)+'</button>';
  h+='</div>';

  // Day panel
  h+='<div class="day-panel">';
  var gdl=day.dl;
  h+='<div class="dp-hdr">';
  h+='<div style="display:flex;flex-direction:column;gap:2px">';
  h+='<div class="dp-date">'+gdl.getDate()+'<span style="font-size:14px;color:var(--text3)">/'+(gdl.getMonth()+1)+'/2026</span></div>';
  h+='<div style="font-size:11px;color:var(--text3)">'+DOW_VN[gdl.getDay()]+'</div>';
  h+='</div>';
  h+='<div style="display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(200,150,10,.08);border:1px solid var(--border);border-radius:7px;padding:6px 10px;min-width:72px;text-align:center">';
  h+='<div style="font-size:18px;font-weight:700;color:var(--gold);font-family:Noto Serif,serif">'+day.d+'<span style="font-size:11px">/'+day.m+'</span></div>';
  h+='<div style="font-size:9.5px;color:var(--text3)">Âm lịch</div>';
  h+='</div>';
  h+='<div class="dp-info">';
  h+='<div class="dp-cc">'+day.cc.can+' '+day.cc.chi+' · Tháng '+day.m+' Âm ('+M_NAME[mi]+')</div>';
  h+='<div class="dp-dl">Lưu Nguyệt: <strong style="color:var(--gold)">'+ln+'</strong></div>';
  h+='</div>';
  h+='<span class="badge '+rateBadge(rc)+'" style="font-size:12px;padding:5px 14px">'+rateLabel(rc)+'</span>';
  h+='</div>'; // dp-hdr

  h+='<div class="dp-body">';

  // Quick stats for this day
  var best=[],warn=[];
  CUNGS.forEach(function(c){var r=rateC(c,nc,ln);if(r==='great'||r==='good')best.push(c.ten+' '+c.icon);if(r==='bad'||r==='warn')warn.push(c.ten+' '+c.icon);});
  h+='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">';
  if(best.length) h+='<div style="background:rgba(26,122,60,.1);border:1px solid rgba(26,122,60,.3);border-radius:6px;padding:6px 11px;font-size:11px"><strong style="color:#5dbd77">Cung sáng:</strong> '+best.join(', ')+'</div>';
  if(warn.length) h+='<div style="background:rgba(139,26,18,.1);border:1px solid rgba(139,26,18,.3);border-radius:6px;padding:6px 11px;font-size:11px"><strong style="color:#ff8a7a">Chú ý:</strong> '+warn.join(', ')+'</div>';
  h+='</div>';

  // 12 cung cards
  h+='<div class="cung-cards">';
  CUNGS.forEach(function(c){
    var cr=rateC(c,nc,ln);
    var cc2=rateColor(cr);
    var bg=cr==='great'?'rgba(26,122,60,.1)':cr==='good'?'rgba(26,82,118,.1)':cr==='warn'?'rgba(125,68,0,.1)':cr==='bad'?'rgba(139,26,18,.1)':'';

    var rels=[];
    if(c.chi===nc) rels.push({t:'Ngày kích',c:cr==='great'||cr==='good'?'#5dbd77':'#ff8a7a'});
    if(isXung(c.chi,nc)) rels.push({t:'Ngày xung',c:'#ff8a7a'});
    if(isTH(c.chi,nc)) rels.push({t:'Tam hợp',c:'#5dbd77'});
    if(LUC_HOP[c.chi]===nc) rels.push({t:'Lục hợp',c:'#5dade2'});
    if(c.chi===ln) rels.push({t:'LN đóng',c:c.hung?'#ff8a7a':'#5dbd77'});
    if(isXung(c.chi,ln)) rels.push({t:'LN xung',c:'#ff8a7a'});
    if(isTH(c.chi,ln)) rels.push({t:'LN tam hợp',c:'#5dbd77'});
    if(!rels.length) rels.push({t:'Bình thường',c:'#636363'});

    var nx=genNX(c,nc,ln);

    h+='<div class="cc-card '+cr+'">';
    h+='<div class="cc-hdr"><span class="cc-ico">'+c.icon+'</span><span class="cc-nm">'+c.ten+'</span><span class="cc-ch">'+c.chi+'</span>';
    h+='<span class="cc-sc badge '+rateBadge(cr)+'">'+rateLabel(cr).replace('⭐ ','').replace('✅ ','').replace('〰 ','').replace('⚠ ','').replace('🔴 ','')+'</span></div>';
    h+='<div class="cc-sao">'+c.sao+'</div>';
    h+='<div class="cc-rels">';
    rels.forEach(function(r){h+='<span class="rel" style="color:'+r.c+';border:1px solid '+r.c+'40">'+r.t+'</span>';});
    h+='</div>';
    h+='<div class="cc-nx">'+nx+'</div>';
    h+='<div class="cc-nen">✅ '+getNen(c.ten)+'</div>';
    h+='<div class="cc-khong">⛔ '+getKhong(c.ten)+'</div>';
    h+='</div>';
  });
  h+='</div>';

  // Overall
  var ov_style='background:'+rateColor(rc)+'20;border-left:3px solid '+sc+';';
  h+='<div class="day-ov" style="'+ov_style+'">';
  h+='<div class="ov-title">'+rateLabel(rc)+' — Ngày '+day.cc.can+' '+day.cc.chi+' · '+day.d+'/'+day.m+' Âm · '+dlFull(day.dl)+'</div>';
  if(rc==='great') h+='Ngày đặc biệt thuận lợi — nhiều cung quan trọng phát sáng. Hãy tận dụng để ra quyết định chiến lược và gặp gỡ đối tác.';
  else if(rc==='good') h+='Ngày khá tốt, dòng chảy hài hòa. Phù hợp làm việc, đàm phán và mở rộng mối quan hệ.';
  else if(rc==='mid') h+='Ngày bình thường. Không có cản trở lớn cũng không nổi bật. Tập trung công việc thường lệ.';
  else if(rc==='warn') h+='Ngày cần thận trọng — một số cung quan trọng bị tác động tiêu cực. Hạn chế quyết định lớn.';
  else h+='Ngày không thuận lợi — nhiều cung bị xung/hung kích. Trì hoãn việc quan trọng, tránh tranh luận.';
  h+='</div>';

  h+='</div></div>'; // dp-body, day-panel

  document.getElementById('main').innerHTML=h;
  window.scrollTo({top:80,behavior:'smooth'});
}

function genNX(c,nc,ln){
  var p=[],cn=c.chi,n=c.ten,h=c.hung;
  if(cn===ln) p.push(h?'LN đóng tại '+n+' — hung tinh phát tác suốt tháng.':'LN đóng tại '+n+' — cung được kích hoạt mạnh nhất tháng.');
  if(isXung(cn,ln)){p.push('LN xung '+n+' — áp lực cả tháng.');if(isXung(cn,nc))p.push('<strong style="color:#ff8a7a">Hôm nay xung kép — cực kỳ cẩn thận.</strong>');}
  if(isTH(cn,ln)) p.push('LN tam hợp '+n+' — được nâng đỡ suốt tháng.');
  if(cn===nc) p.push(h?'Ngày '+nc+' kích trực tiếp — hung tinh nổi lên.':'Ngày '+nc+' kích '+n+' — sao chủ phát huy mạnh.');
  else if(isXung(cn,nc)&&!isXung(cn,ln)) p.push('Ngày '+nc+' xung '+n+' — chú ý hôm nay.');
  else if(isTH(cn,nc)&&!isTH(cn,ln)) p.push('Ngày '+nc+' tam hợp '+n+' — hỗ trợ thêm hôm nay.');
  else if(LUC_HOP[cn]===nc) p.push('Lục hợp nhẹ — hài hòa, thuận lợi vừa phải.');
  if(!p.length) p.push('Không có tương tác đặc biệt hôm nay. '+(h?'Hung tinh tạm yên.':'Sao chủ bình thường.'));
  return p.join(' ');
}

// FILTERS & CONTROLS

// ══════════════════════════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════════════════════════
function render(){
  updateBreadcrumb();
  updateTabs();
  updateSidebar();
  if(view==='year')       renderYear();
  else if(view==='solar') renderSolarCal();
  else if(view==='month') renderMonth();
  else if(view==='week')  renderWeek();
  else if(view==='day')   renderDay();
  // Update sidebar active (only for lunar mode)
  if(!solarMode){
    document.querySelectorAll('.mi').forEach(function(el){el.classList.remove('on');});
    if(view!=='year'){var si=document.getElementById('si-'+currentMonth);if(si){si.classList.add('on');si.scrollIntoView({block:'nearest'});}}
  }
}

// Init — auto-detect week from selectedDay or today
(function(){
  var now=new Date();
  for(var i=11;i>=0;i--){if(now>=M_START[i]){currentMonth=i+1;break;}}
  // Set week to current week
  var days=getDays(currentMonth);
  for(var di=0;di<days.length;di++){
    if(days[di].dl.getDate()===now.getDate()&&days[di].dl.getMonth()===now.getMonth()){
      currentWeek=Math.floor(di/7); break;
    }
  }
  view='year';
  render();
})();
